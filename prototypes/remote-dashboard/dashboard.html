<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Remote Dashboard</title>
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --bg3: #263548;
    --accent: #3b82f6;
    --accent-light: #60a5fa;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --dim: #64748b;
    --border: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
  }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .header .dot.connected { background: var(--green); }

  .tabs {
    display: flex;
    gap: 0;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 24px;
  }
  .tab {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }
  .tab .badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Permissions View */
  .perm-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    border-left: 4px solid var(--orange);
    animation: slideIn 0.3s ease-out;
  }
  .perm-card.resolved { opacity: 0.5; border-left-color: var(--dim); }
  .perm-card .tool-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .perm-card .tool-input {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    background: var(--bg);
    padding: 12px;
    border-radius: 8px;
    margin: 8px 0;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
    max-height: 200px;
    overflow-y: auto;
  }
  .perm-card .meta {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 12px;
  }
  .perm-actions {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }
  .btn {
    padding: 8px 24px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-allow { background: var(--green); color: #000; }
  .btn-allow:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-deny { background: var(--red); color: #fff; }
  .btn-deny:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-sm { padding: 4px 12px; font-size: 12px; }

  /* Activity View */
  .activity-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .activity-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .activity-icon.success { background: rgba(34,197,94,0.15); color: var(--green); }
  .activity-icon.failure { background: rgba(239,68,68,0.15); color: var(--red); }
  .activity-icon.decision { background: rgba(59,130,246,0.15); color: var(--accent-light); }
  .activity-tool { font-weight: 600; color: var(--text); }
  .activity-detail { color: var(--muted); font-family: monospace; font-size: 12px; }
  .activity-time { color: var(--dim); font-size: 11px; margin-left: auto; flex-shrink: 0; }

  /* Claims View */
  .claim-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .claim-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .claim-id {
    font-family: monospace;
    font-size: 12px;
    color: var(--accent-light);
    background: rgba(59,130,246,0.12);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .claim-type {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .claim-type.constraint { color: var(--red); background: rgba(239,68,68,0.12); }
  .claim-type.factual { color: var(--green); background: rgba(34,197,94,0.12); }
  .claim-type.risk { color: var(--orange); background: rgba(245,158,11,0.12); }
  .claim-type.recommendation { color: var(--purple); background: rgba(167,139,250,0.12); }
  .claim-type.estimate { color: var(--accent-light); background: rgba(59,130,246,0.12); }
  .claim-type.feedback { color: #f472b6; background: rgba(244,114,182,0.12); }
  .claim-topic { font-size: 11px; color: var(--dim); }
  .claim-content { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .claim-evidence {
    font-size: 11px; margin-top: 8px; color: var(--dim);
  }
  .evidence-bar {
    display: inline-block;
    height: 4px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
  }
  .evidence-bar.stated { width: 20px; background: var(--dim); }
  .evidence-bar.web { width: 35px; background: var(--orange); }
  .evidence-bar.documented { width: 55px; background: var(--accent); }
  .evidence-bar.tested { width: 75px; background: var(--green); }
  .evidence-bar.production { width: 100px; background: var(--purple); }

  /* Sprint Status */
  .sprint-meta {
    background: var(--bg2);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .sprint-meta h2 { font-size: 18px; margin-bottom: 8px; }
  .sprint-meta .question { font-size: 14px; color: var(--muted); }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin: 16px 0;
  }
  .stat-card {
    background: var(--bg);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 700; }
  .stat-card .label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Topic filter */
  .topic-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .topic-chip {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--bg2);
    color: var(--muted);
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .topic-chip:hover, .topic-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--dim);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }

  @keyframes slideIn {
    from { transform: translateY(-10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Mobile */
  @media (max-width: 640px) {
    .header { padding: 10px 16px; }
    .content { padding: 16px; }
    .tabs { padding: 0 16px; overflow-x: auto; }
    .perm-actions { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>Claude Code Remote</h1>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="permissions">
      Permissions <span class="badge" id="permBadge" style="display:none">0</span>
    </div>
    <div class="tab" data-tab="activity">Activity</div>
    <div class="tab" data-tab="claims">Claims</div>
    <div class="tab" data-tab="sprint">Sprint</div>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
const TOKEN = '{{TOKEN}}';
const WS_URL = `ws://${location.host}/ws?token=${TOKEN}`;
const API = (path) => `${location.origin}${path}?token=${TOKEN}`;

let ws;
let state = { pending: [], activity: [], claims: null, compilation: null };
let activeTab = 'permissions';
let topicFilter = null;

// --- WebSocket ---
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('statusDot').className = 'dot connected';
    document.getElementById('statusText').textContent = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = 'Disconnected — reconnecting...';
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      state = msg.data;
      break;
    case 'permission_request':
      state.pending.push(msg.data);
      if (Notification.permission === 'granted') {
        new Notification(`${msg.data.tool_name} needs approval`, {
          body: formatInput(msg.data.tool_input),
          tag: msg.data.requestId,
        });
      }
      break;
    case 'permission_resolved':
      state.pending = state.pending.filter(p => p.requestId !== msg.data.requestId);
      break;
    case 'permission_expired':
      state.pending = state.pending.filter(p => p.requestId !== msg.data.requestId);
      break;
    case 'activity':
      state.activity.push(msg.data);
      if (state.activity.length > 200) state.activity.shift();
      break;
    case 'claims':
      state.claims = msg.data;
      break;
    case 'compilation':
      state.compilation = msg.data;
      break;
    case 'notification':
      if (Notification.permission === 'granted') {
        new Notification(msg.data.title, { body: msg.data.body });
      }
      break;
  }
  render();
}

// --- Actions ---
async function decide(requestId, allow) {
  await fetch(API('/api/decide'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ requestId, allow, reason: allow ? 'Approved remotely' : 'Denied remotely' }),
  });
}

// --- Render ---
function render() {
  updateBadge();
  const el = document.getElementById('content');
  switch (activeTab) {
    case 'permissions': el.innerHTML = renderPermissions(); break;
    case 'activity': el.innerHTML = renderActivity(); break;
    case 'claims': el.innerHTML = renderClaims(); break;
    case 'sprint': el.innerHTML = renderSprint(); break;
  }
}

function updateBadge() {
  const badge = document.getElementById('permBadge');
  const n = state.pending.length;
  badge.style.display = n > 0 ? 'inline-block' : 'none';
  badge.textContent = n;
  // Update tab title
  document.title = n > 0 ? `(${n}) Claude Code Remote` : 'Claude Code Remote';
}

function renderPermissions() {
  if (state.pending.length === 0) {
    return `<div class="empty"><div class="icon">&#10003;</div><p>No pending permissions</p><p style="font-size:12px;margin-top:4px;">Claude Code will send requests here when it needs approval</p></div>`;
  }
  return state.pending.map(p => `
    <div class="perm-card" id="perm-${p.requestId}">
      <div class="tool-name">${esc(p.tool_name)}</div>
      <div class="meta">Session ${esc((p.session_id||'').slice(0,8))} · ${esc(p.permission_mode || 'default')} mode · ${esc(p.cwd || '')}</div>
      <div class="tool-input">${esc(formatInput(p.tool_input))}</div>
      <div class="perm-actions">
        <button class="btn btn-allow" onclick="decide('${esc(p.requestId)}', true)">Allow</button>
        <button class="btn btn-deny" onclick="decide('${esc(p.requestId)}', false)">Deny</button>
      </div>
    </div>
  `).join('');
}

function renderActivity() {
  if (state.activity.length === 0) {
    return `<div class="empty"><div class="icon">&#9881;</div><p>No activity yet</p><p style="font-size:12px;margin-top:4px;">Tool calls will appear here as Claude Code works</p></div>`;
  }
  return [...state.activity].reverse().map(a => {
    const icon = a.type === 'failure' ? '&#10007;' : a.type === 'decision' ? '&#9998;' : '&#10003;';
    const cls = a.type === 'failure' ? 'failure' : a.type === 'decision' ? 'decision' : 'success';
    return `
      <div class="activity-item">
        <div class="activity-icon ${cls}">${icon}</div>
        <div>
          <div><span class="activity-tool">${esc(a.tool_name || '')}</span>
          ${a.decision ? ` &mdash; <span style="color:${a.decision === 'allowed' ? 'var(--green)' : 'var(--red)'}">${esc(a.decision)}</span>` : ''}</div>
          <div class="activity-detail">${esc(formatInput(a.tool_input))}</div>
        </div>
        <div class="activity-time">${timeAgo(a.timestamp)}</div>
      </div>
    `;
  }).join('');
}

function renderClaims() {
  if (!state.claims || !state.claims.claims) {
    return `<div class="empty"><div class="icon">&#128203;</div><p>No claims loaded</p><p style="font-size:12px;margin-top:4px;">Point the server at your claims.json with --claims</p></div>`;
  }

  const claims = state.claims.claims;
  const topics = [...new Set(claims.map(c => c.topic))];

  let filtered = topicFilter ? claims.filter(c => c.topic === topicFilter) : claims;

  return `
    <div class="topic-filters">
      <div class="topic-chip ${!topicFilter ? 'active' : ''}" onclick="topicFilter=null;render()">All (${claims.length})</div>
      ${topics.map(t => {
        const n = claims.filter(c => c.topic === t).length;
        return `<div class="topic-chip ${topicFilter === t ? 'active' : ''}" onclick="topicFilter='${esc(t)}';render()">${esc(t)} (${n})</div>`;
      }).join('')}
    </div>
    ${filtered.map(c => `
      <div class="claim-card">
        <div class="claim-header">
          <span class="claim-id">${esc(c.id)}</span>
          <span class="claim-type ${esc(c.type)}">${esc(c.type)}</span>
          <span class="claim-topic">${esc(c.topic)}</span>
        </div>
        <div class="claim-content">${esc(c.content)}</div>
        <div class="claim-evidence">
          <span class="evidence-bar ${esc(c.evidence)}"></span>
          ${esc(c.evidence)} · ${esc(c.phase_added)} phase
          ${c.tags ? ` · ${c.tags.map(t => `<span style="color:var(--dim)">#${esc(t)}</span>`).join(' ')}` : ''}
        </div>
      </div>
    `).join('')}
  `;
}

function renderSprint() {
  if (!state.claims) {
    return `<div class="empty"><div class="icon">&#128640;</div><p>No sprint data</p></div>`;
  }

  const meta = state.claims.meta;
  const claims = state.claims.claims;
  const types = {};
  const evidence = {};
  const topics = {};
  for (const c of claims) {
    types[c.type] = (types[c.type] || 0) + 1;
    evidence[c.evidence] = (evidence[c.evidence] || 0) + 1;
    topics[c.topic] = (topics[c.topic] || 0) + 1;
  }

  return `
    <div class="sprint-meta">
      <h2>${esc(meta.phase)} phase</h2>
      <div class="question">${esc(meta.question)}</div>
      <div style="font-size:12px;color:var(--dim);margin-top:4px;">
        Started ${esc(meta.initiated)} · Audience: ${(meta.audience||[]).map(esc).join(', ')}
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="num" style="color:var(--accent-light)">${claims.length}</div>
        <div class="label">Total Claims</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:var(--green)">${claims.filter(c => c.status === 'active').length}</div>
        <div class="label">Active</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:var(--orange)">${Object.keys(topics).length}</div>
        <div class="label">Topics</div>
      </div>
      <div class="stat-card">
        <div class="num" style="color:var(--purple)">${state.pending.length}</div>
        <div class="label">Pending Perms</div>
      </div>
    </div>

    <h3 style="font-size:13px;color:var(--muted);margin:20px 0 10px;text-transform:uppercase;letter-spacing:0.08em;">By Type</h3>
    ${Object.entries(types).map(([t, n]) => `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span class="claim-type ${t}" style="min-width:110px;text-align:center;">${t}</span>
        <div style="flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;">
          <div style="width:${(n/claims.length*100).toFixed(0)}%;height:100%;background:var(--accent);border-radius:4px;"></div>
        </div>
        <span style="font-size:12px;color:var(--dim);min-width:24px;text-align:right;">${n}</span>
      </div>
    `).join('')}

    <h3 style="font-size:13px;color:var(--muted);margin:20px 0 10px;text-transform:uppercase;letter-spacing:0.08em;">By Evidence</h3>
    ${['stated','web','documented','tested','production'].filter(e => evidence[e]).map(e => `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span style="font-size:12px;color:var(--dim);min-width:90px;">${e}</span>
        <div style="flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;">
          <div style="width:${(evidence[e]/claims.length*100).toFixed(0)}%;height:100%;border-radius:4px;" class="evidence-bar ${e}" style="width:100%;height:100%;"></div>
        </div>
        <span style="font-size:12px;color:var(--dim);min-width:24px;text-align:right;">${evidence[e]}</span>
      </div>
    `).join('')}
  `;
}

// --- Helpers ---
function formatInput(input) {
  if (!input) return '';
  if (input.command) return input.command;
  if (input.file_path) return `${input.file_path}${input.content ? '\n' + input.content.slice(0, 500) : ''}`;
  if (input.pattern) return `pattern: ${input.pattern}`;
  if (input.prompt) return input.prompt.slice(0, 300);
  return JSON.stringify(input, null, 2).slice(0, 500);
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 5) return 'now';
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    render();
  });
});

// --- Notifications ---
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// --- Boot ---
connect();
</script>
</body>
</html>
