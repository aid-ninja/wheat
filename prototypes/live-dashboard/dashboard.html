<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheat — Live Sprint</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263548;
    --border: rgba(255,255,255,0.06);
    --border-b: rgba(255,255,255,0.1);
    --text: #f1f5f9;
    --text-mid: #94a3b8;
    --text-dim: #64748b;
    --accent: #f59e0b;
    --blue: #3b82f6;
    --blue-light: #60a5fa;
    --blue-dim: rgba(59,130,246,0.12);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --cyan: #22d3ee;
    --cyan-dim: rgba(34,211,238,0.12);
    --pink: #f472b6;
    --pink-dim: rgba(244,114,182,0.12);
    --orange-dim: rgba(245,158,11,0.12);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── Top Bar ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,23,42,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--accent) 0%, #fbbf24 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    flex-shrink: 0;
  }

  .topbar-question {
    flex: 1;
    font-size: 13px;
    color: var(--text-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .topbar-badges {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .pill {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 99px;
    letter-spacing: 0.02em;
  }

  .pill-phase { background: var(--blue-dim); color: var(--blue-light); }
  .pill-ready { background: var(--green-dim); color: var(--green); }
  .pill-blocked { background: var(--red-dim); color: var(--red); }
  .pill-count { background: rgba(255,255,255,0.06); color: var(--text-mid); }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--green);
    font-weight: 600;
  }

  .live-indicator .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: livePulse 2s ease-in-out infinite;
  }

  .disconnected .live-indicator .dot { background: var(--red); animation: none; }
  .disconnected .live-indicator { color: var(--red); }

  @keyframes livePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
  }

  /* ── Compiler Strip ── */
  .compiler-strip {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .compiler-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-right: 12px;
    flex-shrink: 0;
  }

  .pass {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: transparent;
    transition: all 0.25s ease;
    white-space: nowrap;
  }

  .pass .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    transition: all 0.25s ease;
    flex-shrink: 0;
  }

  .pass.done { color: var(--text-mid); background: rgba(34,197,94,0.06); }
  .pass.done .dot { background: var(--green); }
  .pass.running { color: var(--blue-light); background: var(--blue-dim); }
  .pass.running .dot { background: var(--blue-light); animation: livePulse 0.6s infinite; }
  .pass.warn { color: var(--accent); background: var(--orange-dim); }
  .pass.warn .dot { background: var(--accent); }
  .pass.fail { color: var(--red); background: var(--red-dim); }
  .pass.fail .dot { background: var(--red); }

  .pass-arrow {
    color: rgba(255,255,255,0.12);
    font-size: 10px;
    flex-shrink: 0;
  }

  /* ── Main Grid ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 24px 32px 40px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .col-span { grid-column: 1 / -1; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-head {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-dim);
  }

  .card-body { padding: 0 20px 20px; }

  /* ── Phase Progress ── */
  .phase-track {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .phase-seg {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.04);
    overflow: hidden;
    transition: background 0.4s;
  }

  .phase-seg.complete { background: var(--green); }
  .phase-seg.current { background: var(--blue); }

  .phase-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
  }

  .phase-labels span { color: var(--text-dim); display: flex; align-items: center; gap: 4px; }
  .phase-labels span.complete { color: var(--green); }
  .phase-labels span.current { color: var(--blue-light); font-weight: 600; }

  .phase-n {
    font-size: 9px;
    background: rgba(255,255,255,0.06);
    padding: 0 5px;
    border-radius: 4px;
    color: var(--text-mid);
  }

  /* ── Coverage ── */
  .cov-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
  }

  .cov-row + .cov-row { border-top: 1px solid var(--border); }

  .cov-topic {
    min-width: 120px;
    font-size: 13px;
    font-weight: 600;
  }

  .cov-track {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    overflow: hidden;
  }

  .cov-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
  }

  .cov-tier {
    font-size: 11px;
    font-weight: 600;
    min-width: 90px;
    text-align: right;
  }

  /* ── Claims ── */
  .claim-card {
    padding: 14px 16px;
    border-radius: 8px;
    background: rgba(255,255,255,0.02);
    border-left: 3px solid var(--blue);
    margin-bottom: 8px;
    transition: background 0.2s;
  }

  .claim-card:hover { background: rgba(255,255,255,0.04); }

  .claim-card.t-constraint { border-left-color: var(--red); }
  .claim-card.t-factual { border-left-color: var(--blue-light); }
  .claim-card.t-estimate { border-left-color: var(--purple); }
  .claim-card.t-risk { border-left-color: var(--pink); }
  .claim-card.t-recommendation { border-left-color: var(--green); }
  .claim-card.t-feedback { border-left-color: var(--cyan); }
  .claim-card.superseded { opacity: 0.3; }
  .claim-card.superseded .cc-text { text-decoration: line-through; }
  .claim-card.conflicted { border-left-color: var(--red); border-left-style: dashed; }

  .cc-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .cc-id {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .tag-constraint { background: var(--red-dim); color: var(--red); }
  .tag-factual { background: var(--blue-dim); color: var(--blue-light); }
  .tag-estimate { background: var(--purple-dim); color: var(--purple); }
  .tag-risk { background: var(--pink-dim); color: var(--pink); }
  .tag-recommendation { background: var(--green-dim); color: var(--green); }
  .tag-feedback { background: var(--cyan-dim); color: var(--cyan); }

  .tag-stated { background: rgba(255,255,255,0.05); color: var(--text-dim); }
  .tag-web { background: var(--blue-dim); color: var(--blue-light); }
  .tag-documented { background: var(--purple-dim); color: var(--purple); }
  .tag-tested { background: var(--green-dim); color: var(--green); }
  .tag-production { background: var(--orange-dim); color: var(--accent); }

  .cc-text {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  .cc-footer {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    display: flex;
    gap: 10px;
  }

  /* ── Phase Group ── */
  .pg { margin-bottom: 20px; }

  .pg-head {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding-bottom: 8px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Conflicts ── */
  .conflict-item {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.5;
  }

  .conflict-item.resolved {
    background: var(--green-dim);
    border-left: 3px solid var(--green);
  }

  .conflict-item.unresolved {
    background: var(--red-dim);
    border-left: 3px solid var(--red);
  }

  .ci-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  .ci-label.resolved { color: var(--green); }
  .ci-label.unresolved { color: var(--red); }

  .ci-text { color: var(--text-mid); }

  /* ── Git Log ── */
  .git-row {
    display: flex;
    gap: 12px;
    padding: 7px 0;
    font-size: 12px;
    align-items: baseline;
  }

  .git-row + .git-row { border-top: 1px solid var(--border); }

  .git-hash {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-weight: 700;
    color: var(--accent);
    font-size: 11px;
    flex-shrink: 0;
  }

  .git-msg {
    color: var(--text-mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Certificate ── */
  .cert {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 2;
    padding: 4px 0;
  }

  .cert-k { color: var(--text-dim); }
  .cert-v { color: var(--green); }
  .cert-h { color: var(--accent); word-break: break-all; }

  /* ── Warnings ── */
  .warn-item {
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--orange-dim);
    border-left: 3px solid var(--accent);
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  .warn-item strong { color: var(--accent); font-weight: 700; }

  /* ── Section labels ── */
  .sec-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    padding: 12px 0 8px;
  }

  .sec-label:first-child { padding-top: 0; }

  /* ── Empty ── */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* ── Flash ── */
  .flash { animation: flashAnim 0.5s ease; }

  @keyframes flashAnim {
    0% { box-shadow: inset 0 0 0 1px rgba(245,158,11,0.3); }
    100% { box-shadow: inset 0 0 0 1px transparent; }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* ── Responsive ── */
  @media (max-width: 960px) {
    .main { grid-template-columns: 1fr; padding: 16px; }
    .topbar { padding: 12px 16px; }
    .compiler-strip { padding: 10px 16px; overflow-x: auto; }
    .col-span { grid-column: 1; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar" id="topbar">
  <div class="topbar-logo">wheat</div>
  <div class="topbar-question" id="hd-question">Loading...</div>
  <div class="topbar-badges">
    <span class="pill pill-phase" id="hd-phase">-</span>
    <span class="pill pill-count" id="hd-claims">-</span>
    <span class="pill" id="hd-status">-</span>
    <div class="live-indicator" id="hd-live"><div class="dot"></div>LIVE</div>
  </div>
</div>

<!-- Compiler Strip -->
<div class="compiler-strip" id="compiler-strip">
  <span class="compiler-label">Compiler</span>
  <div class="pass" data-i="0"><div class="dot"></div>Schema</div><span class="pass-arrow">›</span>
  <div class="pass" data-i="1"><div class="dot"></div>Types</div><span class="pass-arrow">›</span>
  <div class="pass" data-i="2"><div class="dot"></div>Evidence</div><span class="pass-arrow">›</span>
  <div class="pass" data-i="3"><div class="dot"></div>Conflicts</div><span class="pass-arrow">›</span>
  <div class="pass" data-i="4"><div class="dot"></div>Resolve</div><span class="pass-arrow">›</span>
  <div class="pass" data-i="5"><div class="dot"></div>Coverage</div><span class="pass-arrow">›</span>
  <div class="pass" data-i="6"><div class="dot"></div>Ready</div>
</div>

<!-- Main -->
<div class="main">
  <!-- Phase Progress -->
  <div class="card col-span" id="phase-card">
    <div class="card-head"><span class="card-title">Sprint Progress</span><span class="card-meta" id="phase-meta"></span></div>
    <div class="card-body" id="phase-body"></div>
  </div>

  <!-- Claims -->
  <div class="card">
    <div class="card-head"><span class="card-title">Claims</span><span class="card-meta" id="claims-meta"></span></div>
    <div class="card-body" id="claims-body"><div class="empty">Waiting for data...</div></div>
  </div>

  <!-- Compilation -->
  <div class="card">
    <div class="card-head"><span class="card-title">Compilation</span><span class="card-meta" id="comp-time"></span></div>
    <div class="card-body" id="comp-body"><div class="empty">Waiting for compilation...</div></div>
  </div>
</div>

<script>
let comp = null, claimsData = null, prevHash = null;

const tierVal = { stated:1, web:2, documented:3, tested:4, production:5 };
const tierColor = { stated:'var(--text-dim)', web:'var(--blue-light)', documented:'var(--purple)', tested:'var(--green)', production:'var(--accent)' };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── SSE ──
function connectSSE() {
  const es = new EventSource('/events');
  es.addEventListener('connected', () => { document.getElementById('topbar').classList.remove('disconnected'); fetchAll(); });
  es.addEventListener('compilation', () => fetchAll());
  es.onerror = () => document.getElementById('topbar').classList.add('disconnected');
}

async function fetchAll() {
  animatePasses();
  try {
    const [cr, clr, gr] = await Promise.all([fetch('/compilation.json'), fetch('/claims.json'), fetch('/git-log')]);
    comp = await cr.json(); claimsData = await clr.json(); const git = await gr.text();
    if (comp.claims_hash !== prevHash) { prevHash = comp.claims_hash; render(git); }
  } catch(e) { console.error(e); }
}

// ── Compiler animation ──
function animatePasses() {
  const passes = document.querySelectorAll('.pass');
  passes.forEach((p,i) => {
    p.className = 'pass';
    setTimeout(() => { p.classList.add('running'); setTimeout(() => { p.classList.remove('running'); p.classList.add('done'); }, 100); }, i * 70);
  });
}

function finalizeCompiler() {
  if (!comp) return;
  const passes = document.querySelectorAll('.pass');
  if (comp.conflict_graph.unresolved.length > 0) passes[3].className = 'pass fail';
  const weak = Object.values(comp.coverage).filter(c => c.status === 'weak').length;
  if (weak > 0) passes[5].className = 'pass warn';
  passes[6].className = comp.status === 'ready' ? 'pass done' : 'pass fail';
}

// ── Render ──
function render(git) {
  if (!comp || !claimsData) return;
  const m = comp.sprint_meta;

  // Header
  document.getElementById('hd-question').textContent = m.question || 'No sprint';
  document.getElementById('hd-phase').textContent = m.phase;
  document.getElementById('hd-claims').textContent = m.total_claims + ' claims';
  const sb = document.getElementById('hd-status');
  sb.textContent = comp.status;
  sb.className = 'pill ' + (comp.status === 'ready' ? 'pill-ready' : 'pill-blocked');
  document.getElementById('comp-time').textContent = new Date(comp.compiled_at).toLocaleTimeString();
  document.getElementById('claims-meta').textContent = m.active_claims + ' active, ' + m.superseded_claims + ' superseded';

  setTimeout(finalizeCompiler, 550);
  renderPhase();
  renderClaims();
  renderComp(git);
}

function renderPhase() {
  const ps = comp.phase_summary;
  const order = ['define','research','prototype','evaluate'];
  const current = comp.sprint_meta.phase;
  let passedCurrent = false;

  let segs = '', labels = '';
  order.forEach(p => {
    const isCurrent = p === current;
    const done = ps[p] && ps[p].complete && !isCurrent && !passedCurrent;
    if (isCurrent) passedCurrent = true;
    const cls = done ? 'complete' : isCurrent ? 'current' : '';
    segs += `<div class="phase-seg ${cls}"></div>`;
    const n = ps[p] ? ps[p].claims : 0;
    labels += `<span class="${cls}">${p}${n ? ' <span class="phase-n">' + n + '</span>' : ''}</span>`;
  });
  // compile
  segs += `<div class="phase-seg"></div>`;
  labels += `<span>compile</span>`;

  document.getElementById('phase-body').innerHTML = `<div class="phase-track">${segs}</div><div class="phase-labels">${labels}</div>`;
  document.getElementById('phase-meta').textContent = m.total_claims + ' claims across ' + Object.keys(comp.coverage).length + ' topics';
}

function renderClaims() {
  const body = document.getElementById('claims-body');
  const all = claimsData.claims || [];
  if (!all.length) { body.innerHTML = '<div class="empty">No claims yet. Run /init.</div>'; return; }

  const phases = ['define','research','prototype','evaluate','feedback'];
  const grouped = {}; phases.forEach(p => grouped[p] = []);
  all.forEach(c => { const p = c.phase_added || 'define'; (grouped[p] = grouped[p] || []).push(c); });

  let h = '';
  phases.forEach(phase => {
    const list = grouped[phase]; if (!list.length) return;
    h += `<div class="pg"><div class="pg-head">${phase} <span class="phase-n">${list.length}</span></div>`;
    list.forEach(c => {
      const cls = c.status === 'superseded' ? 'superseded' : c.status === 'conflicted' ? 'conflicted' : '';
      h += `<div class="claim-card t-${c.type} ${cls}">
        <div class="cc-row">
          <span class="cc-id">${c.id}</span>
          <span class="tag tag-${c.type}">${c.type}</span>
          <span class="tag tag-${c.evidence}" style="margin-left:auto">${c.evidence}</span>
        </div>
        <div class="cc-text">${esc(c.content)}</div>
        <div class="cc-footer">
          <span>${c.topic}</span>
          ${c.status !== 'active' ? `<span style="color:${c.status==='superseded'?'var(--red)':'var(--accent)'}">${c.status}${c.resolved_by?' by '+c.resolved_by:''}</span>` : ''}
        </div>
      </div>`;
    });
    h += '</div>';
  });

  body.innerHTML = h;
  body.parentElement.classList.add('flash');
  setTimeout(() => body.parentElement.classList.remove('flash'), 500);
}

function renderComp(git) {
  const body = document.getElementById('comp-body');
  let h = '';

  // Coverage
  h += '<div class="sec-label">Evidence Coverage</div>';
  const sorted = Object.entries(comp.coverage).sort((a,b) => (tierVal[b[1].max_evidence]||0) - (tierVal[a[1].max_evidence]||0));
  sorted.forEach(([topic, d]) => {
    const pct = ((tierVal[d.max_evidence]||1)/5)*100;
    const col = tierColor[d.max_evidence] || 'var(--text-dim)';
    h += `<div class="cov-row">
      <span class="cov-topic">${topic}</span>
      <div class="cov-track"><div class="cov-fill" style="width:${pct}%;background:${col}"></div></div>
      <span class="cov-tier" style="color:${col}">${d.max_evidence} (${d.claims})</span>
    </div>`;
  });

  // Conflicts
  const res = comp.conflict_graph.resolved || [], unres = comp.conflict_graph.unresolved || [];
  if (res.length || unres.length) {
    h += '<div class="sec-label">Conflicts</div>';
    unres.forEach(c => { h += `<div class="conflict-item unresolved"><div class="ci-label unresolved">Unresolved</div><div class="ci-text">${c.claimA} vs ${c.claimB} &mdash; ${c.reason||'same tier'}</div></div>`; });
    res.forEach(c => { h += `<div class="conflict-item resolved"><div class="ci-label resolved">Resolved</div><div class="ci-text"><strong>${c.winner}</strong> over ${c.loser} &mdash; ${esc(c.reason)}</div></div>`; });
  }

  // Warnings
  const warns = comp.warnings || [];
  if (warns.length) {
    h += '<div class="sec-label">Warnings</div>';
    warns.forEach(w => { h += `<div class="warn-item"><strong>${w.code}</strong> ${esc(w.message)}</div>`; });
  }

  // Git log
  const lines = git.trim().split('\n').filter(l => l.trim());
  if (lines.length && lines[0] !== 'no commits') {
    h += '<div class="sec-label">Sprint Event Log</div>';
    lines.forEach(l => {
      const m = l.match(/^([a-f0-9]+)\s+(.*)$/);
      if (m) h += `<div class="git-row"><span class="git-hash">${m[1]}</span><span class="git-msg">${esc(m[2])}</span></div>`;
    });
  }

  // Certificate
  if (comp.compilation_certificate) {
    h += '<div class="sec-label">Certificate</div>';
    h += `<div class="cert">
      <span class="cert-k">status</span> <span class="cert-v">${comp.status}</span><br>
      <span class="cert-k">active</span> <span class="cert-v">${comp.sprint_meta.active_claims}</span>
      <span class="cert-k">superseded</span> <span class="cert-v">${comp.sprint_meta.superseded_claims}</span>
      <span class="cert-k">conflicted</span> <span class="cert-v">${comp.sprint_meta.conflicted_claims}</span><br>
      <span class="cert-k">hash</span> <span class="cert-h">${comp.compilation_certificate.input_hash}</span><br>
      <span class="cert-k">compiler</span> <span class="cert-v">v${comp.compilation_certificate.compiler_version}</span>
      <span class="cert-k">deterministic</span> <span class="cert-v">${comp.compilation_certificate.deterministic}</span>
    </div>`;
  }

  body.innerHTML = h;
  body.parentElement.classList.add('flash');
  setTimeout(() => body.parentElement.classList.remove('flash'), 500);
}

connectSSE();
</script>
</body>
</html>
