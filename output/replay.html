dates the DOM on each frame change, and a controller manages currentFrame/playing/speed. This is the pattern used by Bostock's Bar Chart Race, COVID time-series dashboards, and Observable's Scrubber component. For ~30 frames x ~100 claims, inline data is well under 1MB.","evidence":"web","status":"active"},{"id":"r043","type":"factual","topic":"ux-pattern","content":"Timeline scrubbing UI requires three components: (1) an <input type='range'> with step=1 for discrete frame snapping, (2) a play/pause button driving a requestAnimationFrame loop, and (3) auto-pause on user scrub interaction. The range input needs appearance:none with custom thumb/track styling and a JS-driven gradient for progress fill — no pure CSS cross-browser solution exists for partial track fill.","evidence":"web","status":"active"},{"id":"r044","type":"factual","topic":"architecture","content":"For animating claim state changes between frames, CSS transitions (opacity, transform, background-color) handle most cases. The FLIP technique (First-Last-Invert-Play) is required when claims reorder between frames — measure positions before DOM change, apply inverse transform, then animate to new positions. The View Transitions API (baseline Oct 2025) can automate FLIP-like morphing but needs a CSS-transition fallback for older browsers.","evidence":"web","status":"active"},{"id":"r045","type":"recommendation","topic":"architecture","content":"Claim diffs between frames should use simple set operations (not a generic JSON diff library): new IDs = added (green), missing IDs = removed (red), same ID with changed evidence/status = upgraded (amber). Display as inline badges on each claim plus a summary bar per frame ('Frame 7: +3 claims, 1 upgraded'). This is cheaper and more readable than rendering arbitrary JSON diffs.","evidence":"web","status":"active"},{"id":"r046","type":"recommendation","topic":"architecture","content":"Frame data should be generated by the existing /replay pipeline: extract claims.json at each git commit via 'git show <hash>:claims.json', recompile each with 'node wheat-compiler.js --input', compute deltas with '--diff', then bake the full frame array into the HTML template as a const FRAMES = [...] script block. This reuses the compiler's diffCompilations() function rather than inventing a new diff layer.","evidence":"web","status":"active"},{"id":"r047","type":"risk","topic":"architecture","content":"Git-based frame extraction ('git show <hash>:claims.json') requires a git repo at generation time. Archived sprints on orphan branches or tags work fine, but if claims.json was force-pushed or rebased, historical frames may be lost. The generated HTML is self-contained and survives repo deletion, but the generation step is repo-dependent.","evidence":"web","status":"active"}],"coverage":{"accessibility":{"claims":13,"max_evidence":"tested","status":"strong","types":["factual","recommendation","risk"],"claim_ids":["r017","r018","r019","r020","r021","r022","p009","e004","p010","w009","x008","r033","w013"],"constraint_count":0,"source_origins":["evaluation","prototype","research","witness"],"source_count":4,"type_diversity":3,"missing_types":["constraint","estimate","feedback"]},"architecture":{"claims":36,"max_evidence":"tested","status":"strong","types":["estimate","factual","feedback","recommendation","risk"],"claim_ids":["r002","r003","p001","p002","f001","f003","r012","r013","r014","r015","r016","e001","e002","w001","w002","x004","w004","w010","w011","x006","r023","r024","r026","r028","x009","r035","e007","p012","r036","f008","e008","r042","r044","r045","r046","r047"],"constraint_count":3,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":5,"missing_types":["constraint"]},"audience":{"claims":2,"max_evidence":"web","status":"weak","types":["constraint","factual"],"claim_ids":["d003","r040"],"constraint_count":1,"source_origins":["research","stakeholder"],"source_count":2,"type_diversity":2,"missing_types":["estimate","risk","recommendation","feedback"]},"dogfooding":{"claims":10,"max_evidence":"tested","status":"strong","types":["constraint","factual","recommendation","risk"],"claim_ids":["d001","p005","e005","x001","w005","r025","r029","x010","w014","r041"],"constraint_count":1,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":4,"missing_types":["estimate","feedback"]},"output-format":{"claims":12,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","recommendation","risk"],"claim_ids":["d002","r007","f002","r010","p008","e003","x003","p011","w008","w012","r030","r038"],"constraint_count":2,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":5,"missing_types":["estimate"]},"quality":{"claims":11,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","recommendation","risk"],"claim_ids":["d005","f004","r009","r011","e006","f007","x007","r031","r037","e009","f009"],"constraint_count":4,"source_origins":["evaluation","research","stakeholder"],"source_count":3,"type_diversity":5,"missing_types":["estimate"]},"scope":{"claims":3,"max_evidence":"documented","status":"moderate","types":["constraint","estimate","risk"],"claim_ids":["d004","r034","r039"],"constraint_count":1,"source_origins":["research","stakeholder"],"source_count":2,"type_diversity":3,"missing_types":["factual","recommendation","feedback"]},"ux-pattern":{"claims":16,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","recommendation","risk"],"claim_ids":["r004","r005","r006","p003","f005","p006","p007","f006","x002","x005","w003","w006","w007","r027","r032","r043"],"constraint_count":2,"source_origins":["prototype","research","stakeholder","witness"],"source_count":4,"type_diversity":5,"missing_types":["estimate"]}},"stats":{"total":106,"active":103,"conflicted":0,"superseded":3,"topics":8,"phase":"evaluate","status":"ready"},"conflicts":{"resolved":1,"unresolved":0},"delta":{"added":["r042","r043","r044","r045","r046","r047"],"removed":[],"upgraded":[],"statusChanges":[],"newTopics":[]},"milestone":"+6 claims added"}];

// ─── State ───────────────────────────────────────────────────────────────────
let currentFrame = 0;
let playing = false;
let speed = 1; // frames per second
let lastFrameTime = 0;
let animFrameId = null;

// Animated counter targets
const counterState = {
  claims: { current: 0, target: 0 },
  topics: { current: 0, target: 0 },
  conflicts: { current: 0, target: 0 },
};

// Evidence colors
const EVIDENCE_COLORS = {
  stated: '#64748b',
  web: '#f59e0b',
  documented: '#a78bfa',
  tested: '#22c55e',
  production: '#3b82f6',
};

const EVIDENCE_ORDER = ['stated', 'web', 'documented', 'tested', 'production'];

// ─── Init ────────────────────────────────────────────────────────────────────
const scrubber = document.getElementById('scrubber');
const playBtn = document.getElementById('playBtn');
const speedBtn = document.getElementById('speedBtn');
const frameCounter = document.getElementById('frameCounter');
const commitMsg = document.getElementById('commitMsg');
const claimsContainer = document.getElementById('claimsContainer');
const coverageContainer = document.getElementById('coverageContainer');
const deltaBar = document.getElementById('deltaBar');
const milestoneMarkers = document.getElementById('milestoneMarkers');

if (FRAMES.length > 0) {
  scrubber.max = FRAMES.length - 1;

  // Place milestone markers
  FRAMES.forEach((f, i) => {
    if (f.milestone) {
      const pct = (i / (FRAMES.length - 1)) * 100;
      const marker = document.createElement('div');
      marker.className = 'milestone-marker';
      marker.style.left = pct + '%';
      marker.title = f.milestone;
      milestoneMarkers.appendChild(marker);
    }
  });

  render(FRAMES[0]);
}

// ─── Scrubber events ─────────────────────────────────────────────────────────
scrubber.addEventListener('input', () => {
  if (playing) togglePlay(); // auto-pause on scrub
  currentFrame = parseInt(scrubber.value);
  render(FRAMES[currentFrame]);
});

playBtn.addEventListener('click', togglePlay);

const SPEEDS = [1, 2, 4];
let speedIdx = 0;
speedBtn.addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  speed = SPEEDS[speedIdx];
  speedBtn.textContent = speed + 'x';
});

// ─── Keyboard ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' && e.target.type !== 'range') return;

  switch(e.key) {
    case ' ':
    case 'k':
      e.preventDefault();
      togglePlay();
      break;
    case 'ArrowLeft':
    case 'j':
      e.preventDefault();
      if (playing) togglePlay();
      goToFrame(currentFrame - 1);
      break;
    case 'ArrowRight':
    case 'l':
      e.preventDefault();
      if (playing) togglePlay();
      goToFrame(currentFrame + 1);
      break;
    case 'Home':
      e.preventDefault();
      if (playing) togglePlay();
      goToFrame(0);
      break;
    case 'End':
      e.preventDefault();
      if (playing) togglePlay();
      goToFrame(FRAMES.length - 1);
      break;
  }
});

function goToFrame(idx) {
  if (idx < 0 || idx >= FRAMES.length) return;
  currentFrame = idx;
  scrubber.value = idx;
  updateScrubberFill();
  render(FRAMES[idx]);
}

function togglePlay() {
  playing = !playing;
  playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  playBtn.classList.toggle('active', playing);
  if (playing) {
    lastFrameTime = performance.now();
    animFrameId = requestAnimationFrame(playLoop);
  } else if (animFrameId) {
    cancelAnimationFrame(animFrameId);
  }
}

function playLoop(timestamp) {
  if (!playing) return;
  const elapsed = timestamp - lastFrameTime;
  const interval = 1000 / speed;

  if (elapsed >= interval) {
    lastFrameTime = timestamp;
    if (currentFrame < FRAMES.length - 1) {
      currentFrame++;
      scrubber.value = currentFrame;
      updateScrubberFill();
      render(FRAMES[currentFrame]);
    } else {
      togglePlay(); // stop at end
      return;
    }
  }

  animFrameId = requestAnimationFrame(playLoop);
}

function updateScrubberFill() {
  const pct = FRAMES.length > 1 ? (currentFrame / (FRAMES.length - 1)) * 100 : 0;
  scrubber.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}%, var(--bg-card) ${pct}%, var(--bg-card) 100%)`;
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render(frame) {
  if (!frame) return;

  // Update scrubber fill
  updateScrubberFill();

  // Frame counter + commit message
  frameCounter.textContent = (frame.index + 1) + ' / ' + FRAMES.length;
  commitMsg.textContent = frame.commit.hash + ' — ' + frame.commit.message;

  // Claims panel
  renderClaims(frame);

  // Coverage map
  renderCoverage(frame);

  // Stats
  renderStats(frame);

  // Delta bar
  renderDelta(frame);
}

// ─── Claims Panel ────────────────────────────────────────────────────────────
function renderClaims(frame) {
  const groups = {};
  frame.claims.forEach(c => {
    if (!groups[c.topic]) groups[c.topic] = [];
    groups[c.topic].push(c);
  });

  const addedSet = new Set(frame.delta?.added || []);
  const removedSet = new Set(frame.delta?.removed || []);

  let html = '';
  const sortedTopics = Object.keys(groups).sort();

  sortedTopics.forEach(topic => {
    const claims = groups[topic];
    html += '<div class="topic-group">';
    html += '<div class="topic-header"><span>' + escapeHtml(topic) + '</span><span class="topic-count">' + claims.length + '</span></div>';

    claims.forEach((c, idx) => {
      const isNew = addedSet.has(c.id);
      const classes = ['claim-item'];
      if (isNew) {
        classes.push('badge-new', 'claim-enter');
      }

      const delay = isNew ? ' style="animation-delay:' + (idx * 50) + 'ms"' : '';

      html += '<div class="' + classes.join(' ') + '"' + delay + '>';
      html += '<span class="claim-id">' + c.id + '</span>';
      html += '<span class="claim-content">' + escapeHtml(truncate(c.content, 80)) + '</span>';
      html += '<span class="claim-evidence evidence-' + c.evidence + '">' + c.evidence + '</span>';
      html += '</div>';
    });

    html += '</div>';
  });

  // Show removed claims at bottom if any
  if (removedSet.size > 0) {
    html += '<div class="topic-group">';
    html += '<div class="topic-header" style="color:var(--red)"><span>Removed</span></div>';
    removedSet.forEach(id => {
      html += '<div class="claim-item badge-removed">';
      html += '<span class="claim-id">' + id + '</span>';
      html += '<span class="claim-content" style="color:var(--text-dim)">removed in this frame</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  claimsContainer.innerHTML = html;
}

// ─── Coverage Map ────────────────────────────────────────────────────────────
function renderCoverage(frame) {
  const coverage = frame.coverage;
  const topics = Object.keys(coverage).sort();
  const maxClaims = Math.max(...topics.map(t => coverage[t].claims), 1);

  let html = '';
  topics.forEach(topic => {
    const entry = coverage[topic];
    const widthPct = Math.max((entry.claims / maxClaims) * 100, 8);
    const statusClass = 'status-' + entry.status;
    const bgColor = EVIDENCE_COLORS[entry.max_evidence] || EVIDENCE_COLORS.stated;

    html += '<div class="coverage-bar-row">';
    html += '<span class="coverage-topic" title="' + escapeHtml(topic) + '">' + escapeHtml(topic) + '</span>';
    html += '<div class="coverage-bar-track">';
    html += '<div class="coverage-bar-fill" style="width:' + widthPct + '%;background:' + bgColor + ';opacity:0.7;"></div>';
    html += '</div>';
    html += '<span class="coverage-status ' + statusClass + '">' + entry.status + '</span>';
    html += '</div>';
  });

  coverageContainer.innerHTML = html;
}

// ─── Stats ───────────────────────────────────────────────────────────────────
function renderStats(frame) {
  const prev = currentFrame > 0 ? FRAMES[currentFrame - 1] : null;

  // Animate counters
  animateCounter('statClaims', frame.stats.total, prev?.stats.total);
  animateCounter('statTopics', frame.stats.topics, prev?.stats.topics);
  animateCounter('statConflicts', frame.conflicts.unresolved, prev?.conflicts.unresolved);

  document.getElementById('statPhase').textContent = frame.stats.phase;

  // Evidence distribution
  const evidenceCounts = {};
  EVIDENCE_ORDER.forEach(e => evidenceCounts[e] = 0);
  frame.claims.forEach(c => {
    if (evidenceCounts[c.evidence] !== undefined) evidenceCounts[c.evidence]++;
  });

  const total = frame.claims.length || 1;
  const distEl = document.getElementById('evidenceDist');
  const legendEl = document.getElementById('evidenceLegend');

  let distHtml = '';
  let legendHtml = '';
  EVIDENCE_ORDER.forEach(tier => {
    const count = evidenceCounts[tier];
    if (count > 0) {
      const pct = (count / total) * 100;
      distHtml += '<div class="evidence-dist-seg" style="width:' + pct + '%;background:' + EVIDENCE_COLORS[tier] + '"></div>';
      legendHtml += '<span class="evidence-legend-item"><span class="evidence-legend-dot" style="background:' + EVIDENCE_COLORS[tier] + '"></span>' + tier + ' ' + count + '</span>';
    }
  });

  distEl.innerHTML = distHtml;
  legendEl.innerHTML = legendHtml;
}

function animateCounter(elId, target, prevTarget) {
  const el = document.getElementById(elId);
  const deltaEl = document.getElementById(elId + 'Delta');

  el.textContent = target;

  if (deltaEl && prevTarget !== undefined && prevTarget !== null) {
    const diff = target - prevTarget;
    if (diff > 0) {
      deltaEl.textContent = '+' + diff;
      deltaEl.className = 'stat-delta positive';
    } else if (diff < 0) {
      deltaEl.textContent = '' + diff;
      deltaEl.className = 'stat-delta negative';
    } else {
      deltaEl.textContent = '';
      deltaEl.className = 'stat-delta neutral';
    }
  }
}

// ─── Delta Bar ───────────────────────────────────────────────────────────────
function renderDelta(frame) {
  const delta = frame.delta;
  const parts = [];

  parts.push('<span style="color:var(--text-dim)">Frame ' + (frame.index + 1) + ':</span>');

  if (!delta) {
    parts.push('<span>Initial state</span>');
  } else {
    if (delta.added.length > 0) {
      parts.push('<span class="delta-item"><span class="delta-dot" style="background:var(--green)"></span>+' + delta.added.length + ' claims</span>');
    }
    if (delta.removed.length > 0) {
      parts.push('<span class="delta-item"><span class="delta-dot" style="background:var(--red)"></span>-' + delta.removed.length + ' removed</span>');
    }
    if (delta.upgraded.length > 0) {
      const upgStr = delta.upgraded.map(u => u.topic + ': ' + u.from + ' -> ' + u.to).join(', ');
      parts.push('<span class="delta-item"><span class="delta-dot" style="background:var(--orange)"></span>' + delta.upgraded.length + ' upgraded (' + escapeHtml(upgStr) + ')</span>');
    }
    if (delta.newTopics.length > 0) {
      parts.push('<span class="delta-item"><span class="delta-dot" style="background:var(--purple)"></span>New: ' + escapeHtml(delta.newTopics.join(', ')) + '</span>');
    }
    if (delta.statusChanges.length > 0) {
      parts.push('<span class="delta-item"><span class="delta-dot" style="background:var(--accent)"></span>' + delta.statusChanges.length + ' status change(s)</span>');
    }
  }

  if (frame.milestone) {
    parts.push('<span class="milestone-tag">' + escapeHtml(frame.milestone) + '</span>');
  }

  deltaBar.innerHTML = parts.join(' ');
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function truncate(s, max) {
  if (!s) return '';
  return s.length > max ? s.slice(0, max) + '...' : s;
}
