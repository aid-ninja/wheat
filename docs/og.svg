<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08090f"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0a030"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#f0a030" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0a030" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow behind title -->
  <ellipse cx="600" cy="260" rx="400" ry="250" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.02)" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630" opacity="0.3"/>
    <line x1="1200" y1="0" x2="0" y2="630" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="600" y="275" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Inter,Segoe UI,sans-serif" font-weight="800" font-size="128" letter-spacing="-6" fill="url(#gold)">wheat</text>

  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Inter,Segoe UI,sans-serif" font-weight="600" font-size="22" letter-spacing="6" fill="#6b7a8d" text-transform="uppercase">FOR CLAUDE CODE</text>

  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Inter,Segoe UI,sans-serif" font-weight="400" font-size="28" fill="#9ba5b7">Turn messy research into decisions you can defend.</text>

  <!-- Pill badges -->
  <g font-family="-apple-system,BlinkMacSystemFont,Inter,Segoe UI,sans-serif" font-weight="600" font-size="16" letter-spacing="1">
    <!-- Claims -->
    <rect x="295" y="460" width="120" height="34" rx="17" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
    <text x="355" y="482" text-anchor="middle" fill="#60a5fa">CLAIMS</text>
    <!-- Compiler -->
    <rect x="435" y="460" width="140" height="34" rx="17" fill="rgba(240,160,48,0.1)" stroke="rgba(240,160,48,0.2)" stroke-width="1"/>
    <text x="505" y="482" text-anchor="middle" fill="#f0a030">COMPILER</text>
    <!-- Evidence -->
    <rect x="595" y="460" width="140" height="34" rx="17" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="665" y="482" text-anchor="middle" fill="#22c55e">EVIDENCE</text>
    <!-- Artifacts -->
    <rect x="755" y="460" width="150" height="34" rx="17" fill="rgba(167,139,250,0.1)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <text x="830" y="482" text-anchor="middle" fill="#a78bfa">ARTIFACTS</text>
  </g>

  <!-- Bottom bar accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)" opacity="0.3"/>

  <!-- GitHub handle -->
  <text x="600" y="580" text-anchor="middle" font-family="SF Mono,Fira Code,Cascadia Code,Consolas,monospace" font-weight="500" font-size="18" fill="#4f5b6b">github.com/aid-ninja/wheat</text>
</svg>
