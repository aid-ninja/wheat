<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprint Replay — Wheat</title>
<style>
  :root {
    --bg-dark: #0f172a;
    --bg-card: #1e293b;
    --bg-card-hover: #263548;
    --accent: #3b82f6;
    --accent-light: #60a5fa;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --orange: #f59e0b;
    --orange-dim: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --pink: #f472b6;
    --pink-dim: rgba(244,114,182,0.12);
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    font-size: 11pt;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── Top bar: title + scrubber ─────────────────────────────────────── */
  .top-bar {
    padding: 16px 24px 12px;
    background: linear-gradient(180deg, rgba(15,23,42,1) 0%, rgba(15,23,42,0.95) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .top-bar::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 40%;
    height: 100%;
    background: radial-gradient(ellipse at top right, rgba(59,130,246,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .top-title {
    font-size: 14pt;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .top-title span {
    color: var(--accent-light);
    font-weight: 400;
  }

  .scrubber-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 10pt;
    font-family: inherit;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .btn:hover { background: var(--bg-card-hover); }
  .btn.active { background: var(--accent); border-color: var(--accent); }

  #playBtn {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14pt;
    border-radius: 50%;
  }

  .scrubber-track {
    flex: 1;
    position: relative;
  }

  #scrubber {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--bg-card);
    outline: none;
    cursor: pointer;
  }

  #scrubber::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent-light);
    cursor: pointer;
    border: 2px solid var(--bg-dark);
    box-shadow: 0 0 8px rgba(59,130,246,0.4);
    transition: transform 0.1s;
  }

  #scrubber::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  #scrubber::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent-light);
    cursor: pointer;
    border: 2px solid var(--bg-dark);
  }

  .scrubber-info {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    font-size: 9pt;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .frame-counter {
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--accent-light);
    font-size: 10pt;
    min-width: 70px;
  }

  .speed-btn {
    padding: 4px 8px;
    font-size: 9pt;
    min-width: 32px;
    text-align: center;
  }

  .commit-msg {
    margin-top: 6px;
    font-size: 9pt;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── Milestone markers on scrubber ────────────────────────────────── */
  .milestone-markers {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    pointer-events: none;
  }

  .milestone-marker {
    position: absolute;
    top: -3px;
    width: 4px;
    height: 12px;
    background: var(--orange);
    border-radius: 2px;
    transform: translateX(-50%);
    opacity: 0.7;
  }

  /* ─── Main content area ────────────────────────────────────────────── */
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ─── Left panel: claims ───────────────────────────────────────────── */
  .panel-left {
    width: 50%;
    overflow-y: auto;
    padding: 16px 20px;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  .panel-left::-webkit-scrollbar { width: 6px; }
  .panel-left::-webkit-scrollbar-track { background: transparent; }
  .panel-left::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }

  .panel-left-title {
    font-size: 9pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent-light);
    margin-bottom: 12px;
  }

  .topic-group {
    margin-bottom: 16px;
  }

  .topic-header {
    font-size: 9pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .topic-count {
    font-size: 8pt;
    color: var(--text-dim);
    font-weight: 400;
  }

  .claim-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    margin-bottom: 2px;
    transition: opacity 0.3s ease, transform 0.3s ease, background-color 0.4s ease;
    font-size: 9.5pt;
    position: relative;
  }

  .claim-item:hover {
    background: rgba(255,255,255,0.03);
  }

  .claim-id {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 8pt;
    color: var(--text-dim);
    min-width: 36px;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .claim-content {
    flex: 1;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .claim-evidence {
    font-size: 7.5pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .evidence-stated { color: var(--text-dim); background: rgba(100,116,139,0.15); }
  .evidence-web { color: var(--orange); background: var(--orange-dim); }
  .evidence-documented { color: var(--purple); background: var(--purple-dim); }
  .evidence-tested { color: var(--green); background: var(--green-dim); }
  .evidence-production { color: var(--accent-light); background: rgba(59,130,246,0.12); }

  /* Delta badges */
  .badge-new {
    background: var(--green-dim);
    border-left: 3px solid var(--green);
  }

  .badge-upgraded {
    animation: pulse-amber 0.6s ease-out;
  }

  .badge-removed {
    opacity: 0.3;
    transform: scale(0.95);
    text-decoration: line-through;
  }

  /* Claim entry animation */
  .claim-enter {
    animation: claimAppear 0.3s ease-out forwards;
  }

  @keyframes claimAppear {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse-amber {
    0% { background-color: var(--orange-dim); }
    50% { background-color: rgba(245,158,11,0.25); }
    100% { background-color: transparent; }
  }

  /* ─── Right panel: coverage + stats ────────────────────────────────── */
  .panel-right {
    width: 50%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 16px 20px;
  }

  .panel-section + .panel-section {
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .section-title {
    font-size: 9pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent-light);
    margin-bottom: 12px;
  }

  /* Coverage map */
  .coverage-section {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }

  .coverage-section::-webkit-scrollbar { width: 6px; }
  .coverage-section::-webkit-scrollbar-track { background: transparent; }
  .coverage-section::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }

  .coverage-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .coverage-topic {
    font-size: 8.5pt;
    color: var(--text-muted);
    width: 130px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: right;
  }

  .coverage-bar-track {
    flex: 1;
    height: 14px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .coverage-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease-out;
    display: flex;
  }

  .coverage-segment {
    height: 100%;
    transition: width 0.4s ease-out;
  }

  .coverage-status {
    font-size: 7.5pt;
    font-weight: 600;
    text-transform: uppercase;
    width: 60px;
    flex-shrink: 0;
  }

  .status-weak { color: var(--red); }
  .status-moderate { color: var(--orange); }
  .status-strong { color: var(--green); }

  /* Stats */
  .stats-section {
    flex-shrink: 0;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .stat-card {
    background: var(--bg-card);
    border-radius: 10px;
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .stat-label {
    font-size: 8pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 20pt;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }

  .stat-delta {
    font-size: 8pt;
    font-weight: 600;
    margin-left: 4px;
  }

  .stat-delta.positive { color: var(--green); }
  .stat-delta.negative { color: var(--red); }
  .stat-delta.neutral { color: var(--text-dim); }

  /* Evidence distribution mini-bar */
  .evidence-dist {
    display: flex;
    gap: 2px;
    margin-top: 8px;
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
  }

  .evidence-dist-seg {
    height: 100%;
    transition: width 0.4s ease-out;
    min-width: 2px;
  }

  .evidence-dist-legend {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .evidence-legend-item {
    font-size: 7.5pt;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .evidence-legend-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ─── Bottom delta bar ─────────────────────────────────────────────── */
  .delta-bar {
    padding: 10px 24px;
    background: var(--bg-card);
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 9pt;
    color: var(--text-muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 16px;
    min-height: 40px;
  }

  .delta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .delta-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .milestone-tag {
    background: var(--orange-dim);
    color: var(--orange);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 8pt;
    font-weight: 600;
  }

  /* ─── Keyboard hint ────────────────────────────────────────────────── */
  .kbd-hint {
    position: fixed;
    bottom: 52px;
    right: 16px;
    font-size: 7.5pt;
    color: var(--text-dim);
    opacity: 0.5;
  }

  kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 7pt;
    background: rgba(255,255,255,0.05);
  }
</style>
</head>

<!-- Top Bar -->
<div class="top-bar">

</div>

<div class="delta-bar" id="deltaBar">

</div>

xt.js HMR pattern: server sends lightweight notification with just a hash, browser fetches full data only when needed. For Wheat: SSE sends {event:'update', hash:'abc'}, client fetches /compilation.json. Avoids sending large payloads over SSE.","evidence":"web","status":"active"},{"id":"r007","type":"risk","topic":"output-format","content":"A live-updating UI requires a running server, which conflicts with the 'self-contained HTML' constraint (d002). Resolution: the server is the dev experience; the HTML it serves is still self-contained. Two artifacts: wheat-server.js (dev tool) + output HTML (portable artifact).","evidence":"web","status":"active"},{"id":"p001","type":"factual","topic":"architecture","content":"Working prototype: wheat-server.js is 133 lines (not ~80 as estimated). Still zero npm dependencies. Includes: HTTP server, SSE endpoint, fs.watch on claims.json, auto-compile, static file serving, git log endpoint.","evidence":"tested","status":"active"},{"id":"p002","type":"factual","topic":"architecture","content":"SSE auto-reconnect confirmed working: EventSource reconnects automatically when server restarts, no client-side retry logic needed. Browser handles it natively.","evidence":"tested","status":"active"},{"id":"p003","type":"factual","topic":"ux-pattern","content":"Split-pane layout works: left panel shows claims grouped by phase with type/evidence badges, right panel shows compiled output (coverage bars, conflicts, warnings, git log, certificate). Compiler stepper animates across the top on each update.","evidence":"tested","status":"active"},{"id":"p004","type":"factual","topic":"architecture","content":"fs.watch fires reliably on macOS for claims.json edits. 150ms debounce is sufficient to avoid double-fires. Compiler runs in ~50ms for 13 claims — instant feedback loop.","evidence":"tested","status":"active"},{"id":"p005","type":"factual","topic":"dogfooding","content":"The live dashboard successfully visualizes its own sprint. As prototype claims were added to claims.json, the dashboard updated in real time showing the new claims, updated coverage bars, and re-animated compiler stepper. Self-referential loop confirmed working.","evidence":"tested","status":"active"},{"id":"f001","type":"feedback","topic":"architecture","content":"User prefers the static file:// dashboard (output/dashboard.html) over the live SSE server (localhost:3141). The SSE server doesn't add enough value — most interaction is reading the current state, which the static HTML already shows well. The live server is over-engineered for the actual use pattern.","evidence":"stated","status":"active"},{"id":"f002","type":"feedback","topic":"output-format","content":"The self-contained HTML approach (file:// openable, no server needed) is actually the right call for this use case. The /status command already regenerates the dashboard on demand — that's sufficient. Real-time SSE updates are cool but unnecessary.","evidence":"stated","status":"active"},{"id":"f003","type":"feedback","topic":"architecture","content":"The live SSE server IS valuable as a dev-time tool — watching claims update in real time during a sprint is useful. The earlier preference for static (f001) was about the final artifact, not the dev experience. Both have a role: live server for working, static HTML for sharing.","evidence":"stated","status":"active"},{"id":"f004","type":"feedback","topic":"quality","content":"The live dashboard UI (localhost:3141) is too rudimentary — functional but not sleek. Needs a UX polish pass: the layout, typography, and visual hierarchy should feel as polished as the static /status dashboard, not like a debug tool.","evidence":"stated","status":"active"},{"id":"f005","type":"feedback","topic":"ux-pattern","content":"The dashboard needs a timeline-based UI — a visual narrative of the sprint's progression over time, not just a static grid of current state. Data-rich dashboards can be built without overwhelming the user by using progressive disclosure, timeline views, and visual hierarchy. The current layout dumps everything at once instead of telling a story.","evidence":"stated","status":"active"},{"id":"p006","type":"factual","topic":"ux-pattern","content":"Timeline-first dashboard prototype built: vertical timeline as primary UI spine, claims as expandable nodes grouped by phase (define/research/prototype/evaluate/feedback), progressive disclosure via click-to-expand detail panels. Compact scoreboard replaces the old card grid. Coverage shown as inline topic chips with evidence-tier colored dots. Conflict resolutions and warnings appear as inline timeline events. 'Now' node pulses at the bottom showing live watching state.","evidence":"tested","status":"active"},{"id":"p007","type":"factual","topic":"ux-pattern","content":"Phase-colored visual system confirmed effective: each sprint phase gets a distinct color (define=amber, research=blue, prototype=green, evaluate=purple, feedback=cyan) applied consistently to timeline dots, claim IDs, phase headers, and claim dot accents. Creates instant visual grouping without labels.","evidence":"tested","status":"active"},{"id":"f006","type":"constraint","topic":"ux-pattern","content":"New information (latest claims, events, compilations) should populate from the top of the timeline, not the bottom. Reverse chronological order — newest first, like a social feed or activity log. The user shouldn't have to scroll to see what just changed.","evidence":"stated","status":"active"},{"id":"r009","type":"factual","topic":"quality","content":"3 of 4 'weak evidence' compiler warnings are false alarms. Topics audience, scope, and quality consist entirely of constraint/feedback claims whose natural evidence tier is 'stated'. Constraints are stakeholder decisions, not testable hypotheses — 'stated' is their correct and final tier. The compiler's evidence tier system was designed for testable claims, not definitional boundaries.","evidence":"web","status":"active"},{"id":"r010","type":"factual","topic":"output-format","content":"The output-format topic is the only real evidence gap among the 4 warnings. It has a risk claim (r007) at web tier about server-vs-static tension. This is upgradeable to 'tested' by verifying that output/dashboard.html works as self-contained HTML: opens via file://, zero external network requests, all CSS/JS inline, works offline.","evidence":"web","status":"active"},{"id":"r011","type":"risk","topic":"quality","content":"The compiler's W_WEAK_EVIDENCE warning system has a semantic blind spot: it treats all claim types equally, but constraint claims (type: constraint, feedback) are inherently 'stated' tier and cannot be upgraded. This creates persistent false-positive warnings on constraint-heavy topics, reducing signal-to-noise ratio for future sprints.","evidence":"web","status":"active"},{"id":"r012","type":"recommendation","topic":"architecture","content":"The compiler should add constraint-aware coverage analysis: topics where >50% of claims are type 'constraint' or 'feedback' should not emit W_WEAK_EVIDENCE. Instead, emit W_CONSTRAINT_ONLY as an informational note. This preserves the warning for genuinely under-researched topics while silencing noise on definitional ones.","evidence":"web","status":"active"},{"id":"p008","type":"factual","topic":"output-format","content":"All 4 static HTML artifacts (output/dashboard.html, output/problem-statement.html, research/live-ui-architecture.html, research/evidence-gap-analysis.html) verified fully self-contained: zero external URLs, zero <script src=>, zero <link href=>, zero <img src=> pointing to external resources. All CSS and JS are inline. Every file opens correctly via file:// protocol with no network requests. The self-contained HTML constraint (d002) is confirmed satisfied.","evidence":"tested","status":"active"}],"coverage":{"architecture":{"claims":8,"max_evidence":"tested","status":"strong","types":["factual","feedback","recommendation"],"claim_ids": itecture","content":"Claim ID namespace expanded from 5 to 9 prefixes: original d### (define), r### (research), p### (prototype), e### (evaluate), f### (feedback); new x### (challenge), w### (witness), cal### (calibrate); plus burn- synthetic prefix rejected by compiler safety check.","evidence":"documented","status":"active"},{"id":"r016","type":"recommendation","topic":"architecture","content":"The Tier 2 QA commands create three feedback loops: (1) self-correction (/challenge → conflict → /resolve), (2) external validation (/witness → corroboration count), (3) meta-learning (/calibrate → scores predictions against production → validates whether evidence tiers predict accuracy). The /calibrate loop is unique — it's the only command that tests whether Wheat itself works.","evidence":"documented","status":"active"}],"coverage":{"architecture":{"claims":12,"max_evidence":"tested","status":"strong","types":["factual","feedback","recommendation"],"claim_ids":["r002","r003","p001","p002","p004","f001","f003","r012","r013","r014","r015","r016"],"constraint_count":2,"source_origins":["prototype","research","stakeholder"],"source_count":3,"type_diversity":3,"missing_types":["constraint","estimate","risk"]},"audience":{"claims":1,"max_evidence":"stated","status":"weak","types":["constraint"],"claim_ids":["d003"],"constraint_count":1,"source_origins":["stakeholder"],"source_count":1,"type_diversity":1,"missing_types":["factual","estimate","risk","recommendation","feedback"]},"dogfooding":{"claims":2,"max_evidence":"tested","status":"strong","types":["constraint","factual"],"claim_ids":["d001","p005"],"constraint_count":1,"source_origins":["prototype","stakeholder"],"source_count":2,"type_diversity":2,"missing_types":["estimate","risk","recommendation","feedback"]},"output-format":{"claims":5,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","risk"],"claim_ids":["d002","r007","f002","r010","p008"],"constraint_count":2,"source_origins":["prot Next.js HMR pattern: server sends lightweight notification with just a hash, browser fetches full data only when needed. For Wheat: SSE sends {event:'update', hash:'abc'}, client fetches /compilation.json. Avoids sending large payloads over SSE.","evidence":"web","status":"active"},{"id":"r007","type":"risk","topic":"output-format","content":"A live-updating UI requires a running server, which conflicts with the 'self-contained HTML' constraint (d002). Resolution: the server is the dev experience; the HTML it serves is still self-contained. Two artifacts: wheat-server.js (dev tool) + output HTML (portable artifact).","evidence":"web","status":"active"},{"id":"p001","type":"factual","topic":"architecture","content":"Working prototype: wheat-server.js is 133 lines (not ~80 as estimated). Still zero npm dependencies. Includes: HTTP server, SSE endpoint, fs.watch on claims.json, auto-compile, static file serving, git log endpoint.","evidence":"tested","status":"active"},{"id":"p002","type":"factual","topic":"architecture","content":"SSE auto-reconnect confirmed working: EventSource reconnects automatically when server restarts, no client-side retry logic needed. Browser handles it natively.","evidence":"tested","status":"active"},{"id":"p003","type":"factual","topic":"ux-pattern","content":"Split-pane layout works: left panel shows claims grouped by phase with type/evidence badges, right panel shows compiled output (coverage bars, conflicts, warnings, git log, certificate). Compiler stepper animates across the top on each update.","evidence":"tested","status":"active"},{"id":"p004","type":"factual","topic":"architecture","content":"fs.watch fires reliably on macOS for claims.json edits. 150ms debounce is sufficient to avoid double-fires. Compiler runs in ~50ms for 13 claims — instant feedback loop.","evidence":"tested","status":"active"},{"id":"p005","type":"factual","topic":"dogfooding","content":"The live dashboard successfully visualizes its own sprint. As prototype claims were added to claims.json, the dashboard updated in real time showing the new claims, updated coverage bars, and re-animated compiler stepper. Self-referential loop confirmed working.","evidence":"tested","status":"active"},{"id":"f001","type":"feedback","topic":"architecture","content":"User prefers the static file:// dashboard (output/dashboard.html) over the live SSE server (localhost:3141). The SSE server doesn't add enough value — most interaction is reading the current state, which the static HTML already shows well. The live server is over-engineered for the actual use pattern.","evidence":"stated","status":"active"},{"id":"f002","type":"feedback","topic":"output-format","content":"The self-contained HTML approach (file:// openable, no server needed) is actually the right call for this use case. The /status command already regenerates the dashboard on demand — that's sufficient. Real-time SSE updates are cool but unnecessary.","evidence":"stated","status":"active"},{"id":"f003","type":"feedback","topic":"architecture","content":"The live SSE server IS valuable as a dev-time tool — watching claims update in real time during a sprint is useful. The earlier preference for static (f001) was about the final artifact, not the dev experience. Both have a role: live server for working, static HTML for sharing.","evidence":"stated","status":"active"},{"id":"f004","type":"feedback","topic":"quality","content":"The live dashboard UI (localhost:3141) is too rudimentary — functional but not sleek. Needs a UX polish pass: the layout, typography, and visual hierarchy should feel as polished as the static /status dashboard, not like a debug tool.","evidence":"stated","status":"active"},{"id":"f005","type":"feedback","topic":"ux-pattern","content":"The dashboard needs a timeline-based UI — a visual narrative of the sprint's progression over time, not just a static grid of current state. Data-rich dashboards can be built without overwhelming the user by using progressive disclosure, timeline views, and visual hierarchy. The current layout dumps everything at once instead of telling a story.","evidence":"stated","status":"active"},{"id":"p006","type":"factual","topic":"ux-pattern","content":"Timeline-first dashboard prototype built: vertical timeline as primary UI spine, claims as expandable nodes grouped by phase (define/research/prototype/evaluate/feedback), progressive disclosure via click-to-expand detail panels. Compact scoreboard replaces the old card grid. Coverage shown as inline topic chips with evidence-tier colored dots. Conflict resolutions and warnings appear as inline timeline events. 'Now' node pulses at the bottom showing live watching state.","evidence":"tested","status":"active"},{"id":"p007","type":"factual","topic":"ux-pattern","content":"Phase-colored visual system confirmed effective: each sprint phase gets a distinct color (define=amber, research=blue, prototype=green, evaluate=purple, feedback=cyan) applied consistently to timeline dots, claim IDs, phase headers, and claim dot accents. Creates instant visual grouping without labels.","evidence":"tested","status":"active"},{"id":"f006","type":"constraint","topic":"ux-pattern","content":"New information (latest claims, events, compilations) should populate from the top of the timeline, not the bottom. Reverse chronological order — newest first, like a social feed or activity log. The user shouldn't have to scroll to see what just changed.","evidence":"stated","status":"active"},{"id":"r009","type":"factual","topic":"quality","content":"3 of 4 'weak evidence' compiler warnings are false alarms. Topics audience, scope, and quality consist entirely of constraint/feedback claims whose natural evidence tier is 'stated'. Constraints are stakeholder decisions, not testable hypotheses — 'stated' is their correct and final tier. The compiler's evidence tier system was designed for testable claims, not definitional boundaries.","evidence":"web","status":"active"},{"id":"r010","type":"factual","topic":"output-format","content":"The output-format topic is the only real evidence gap among the 4 warnings. It has a risk claim (r007) at web tier about server-vs-static tension. This is upgradeable to 'tested' by verifying that output/dashboard.html works as self-contained HTML: opens via file://, zero external network requests, all CSS/JS inline, works offline.","evidence":"web","status":"active"},{"id":"r011","type":"risk","topic":"quality","content":"The compiler's W_WEAK_EVIDENCE warning system has a semantic blind spot: it treats all claim types equally, but constraint claims (type: constraint, feedback) are inherently 'stated' tier and cannot be upgraded. This creates persistent false-positive warnings on constraint-heavy topics, reducing signal-to-noise ratio for future sprints.","evidence":"web","status":"active"},{"id":"r012","type":"recommendation","topic":"architecture","content":"The compiler should add constraint-aware coverage analysis: topics where >50% of claims are type 'constraint' or 'feedback' should not emit W_WEAK_EVIDENCE. Instead, emit W_CONSTRAINT_ONLY as an informational note. This preserves the warning for genuinely under-researched topics while silencing noise on definitional ones.","evidence":"web","status":"active"},{"id":"p008","type":"factual","topic":"output-format","content":"All 4 static HTML artifacts (output/dashboard.html, output/problem-statement.html, research/live-ui-architecture.html, research/evidence-gap-analysis.html) verified fully self-contained: zero external URLs, zero <script src=>, zero <link href=>, zero <img src=> pointing to external resources. All CSS and JS are inline. Every file opens correctly via file:// protocol with no network requests. The self-contained HTML constraint (d002) is confirmed satisfied.","evidence":"tested","status":"active"},{"id":"r013","type":"factual","topic":"architecture","content":"Wheat command suite expanded from 10 to 17 commands organized in 3 tiers: Tier 1 (Sprint Lifecycle) has 10 original commands for the define→research→prototype→evaluate→ship pipeline. Tier 2 (Quality Assurance) adds 4 new commands (/challenge, /blind-spot, /witness, /calibrate) for adversarial testing and corroboration. Tier 3 (Operations) adds 3 new commands (/replay, /handoff, /merge) for multi-sprint and multi-person workflows.","evidence":"documented","status":"active"},{"id":"r014","type":"factual","topic":"architecture","content":"Compiler grew from ~430 lines (v0.1.0) to 685 lines (v0.2.0) with 9 new capabilities: --input/--output flags, --diff mode, source diversity tracking, type diversity tracking, corroboration system, constraint-aware coverage (W_CONSTRAINT_ONLY), wheat.config.json support, burn-residue safety check, and module exports for library usage. Still zero npm dependencies.","evidence":"documented","status":"active"},{"id":"r015","type":"factual","topic":"architecture","content":"Claim ID namespace expanded from 5 to 9 prefixes: original d### (define), r### (research), p### (prototype), e### (evaluate), f### (feedback); new x### (challenge), w### (witness), cal### (calibrate); plus burn- synthetic prefix rejected by compiler safety check.","evidence":"documented","status":"active"},{"id":"r016","type":"recommendation","topic":"architecture","content":"The Tier 2 QA commands create three feedback loops: (1) self-correction (/challenge → conflict → /resolve), (2) external validation (/witness → corroboration count), (3) meta-learning (/calibrate → scores predictions against production → validates whether evidence tiers predict accuracy). The /calibrate loop is unique — it's the only command that tests whether Wheat itself works.","evidence":"documented","status":"active"},{"id":"r017","type":"factual","topic":"accessibility","content":"The dashboard's --text-dim color (#505a6e on #0a0e1a) has a contrast ratio of 2.78:1, failing WCAG 2.2 AA minimum of 4.5:1 for normal text and 3:1 for UI components. This color is used for metadata labels, tags, phase subtitles, and the 'Now' timestamp — all informational text that becomes unreadable for users with low vision or contrast sensitivity.","evidence":"web","status":"active"},{"id":"r018","type":"risk","topic":"accessibility","content":"The dashboard has zero ARIA landmarks or semantic HTML. All structure uses <div> elements — no <main>, <header>, <nav>, no role attributes. Screen reader users cannot navigate by region, skip to main content, or understand the page structure. This violates WCAG 2.2 SC 1.3.1 (Info and Relationships) and makes the dashboard effectively unusable with assistive technology.","evidence":"web","status":"active"},{"id":"r019","type":"risk","topic":"accessibility","content":"Claim rows use onclick handlers on <div> elements with no keyboard support. No tabindex, no role='button', no Enter/Space key handlers. Keyboard-only users cannot expand claim details. This violates WCAG 2.2 SC 2.1.1 (Keyboard) — all functionality must be operable via keyboard.","evidence":"web","status":"active"},{"id":"r020","type":"risk","topic":"accessibility","content":"SSE-driven DOM updates happen silently — no aria-live regions announce changes to screen readers. When new claims arrive or the compiler status changes, sighted users see animations but screen reader users get zero notification. Adding aria-live='polite' to the scoreboard and timeline would fix this without disrupting the visual experience.","evidence":"web","status":"active"},{"id":"r021","type":"recommendation","topic":"accessibility","content":"Five targeted fixes would bring the dashboard to WCAG 2.2 AA: (1) Raise --text-dim from #505a6e to #7a839a (4.5:1 ratio). (2) Add semantic landmarks: <header> for topbar, <main> for layout, role='status' on scoreboard. (3) Add tabindex='0', role='button', aria-expanded, and keydown handler for Enter/Space on claim rows. (4) Add aria-live='polite' to scoreboard and timeline container. (5) Add :focus-visible outline styles to all interactive elements.","evidence":"web","status":"active"},{"id":"r022","type":"risk","topic":"accessibility","content":"The explainer template (templates/explainer.html) imports Google Fonts via @import url('https://fonts.googleapis.com/...'), which is both an external dependency (tension with d002 self-contained constraint) and an accessibility concern: if the CDN is unreachable, text may render in a fallback font with different metrics, potentially breaking layout. The template should use the system font stack already defined as fallback.","evidence":"web","status":"active"}],"coverage":{"accessibility":{"claims":6,"max_evidence":"web","status":"weak","types":["factual","recommendation","risk"],"claim_ids":["r017","r018","r019","r020","r021","r022"],"constraint_count":0,"source_origins":["research"],"source_count":1,"type_diversity":3,"missing_types":["constraint","estimate","feedback"]},"architecture":{"claims":12,"max_evidence":"tested","status":"strong","types":["factual","feedback","recommendation"],"claim_ids":["r002","r003","p001","p002","p004","f001","f003","r012","r013","r014","r015","r016"],"constraint_count":2,"source_origins":["prototype","research","stakeholder"],"source_count":3,"type_diversity":3,"missing_types":["constraint","estimate","risk"]},"audience":{"claims":1,"max_evidence":"stated","status":"weak","types":["constraint"],"claim_ids":["d003"],"constraint_count":1,"source_origins":["stakeholder"],"source_count":1,"type_diversity":1,"missing_types":["factual","estimate","risk","recommendation","feedback"]},"dogfooding":{"claims":2,"max_evidence":"tested","status":"strong","types":["constraint","factual"],"claim_ids":["d001","p005"],"constraint_count":1,"source_origins":["prototype","stakeholder"],"source_count":2,"type_diversity":2,"missing_types":["estimate","risk","recommendation","feedback"]},"output-format":{"claims":5,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","risk"],"claim_ids":["d002","r007","f002", trast ratio of 2.78:1, failing WCAG 2.2 AA minimum of 4.5:1 for normal text and 3:1 for UI components. This color is used for metadata labels, tags, phase subtitles, and the 'Now' timestamp — all informational text that becomes unreadable for users with low vision or contrast sensitivity.","evidence":"web","status":"active"},{"id":"r018","type":"risk","topic":"accessibility","content":"The dashboard has zero ARIA landmarks or semantic HTML. All structure uses <div> elements — no <main>, <header>, <nav>, no role attributes. Screen reader users cannot navigate by region, skip to main content, or understand the page structure. This violates WCAG 2.2 SC 1.3.1 (Info and Relationships) and makes the dashboard effectively unusable with assistive technology.","evidence":"web","status":"active"},{"id":"r019","type":"risk","topic":"accessibility","content":"Claim rows use onclick handlers on <div> elements with no keyboard support. No tabindex, no role='button', no Enter/Space key handlers. Keyboard-only users cannot expand claim details. This violates WCAG 2.2 SC 2.1.1 (Keyboard) — all functionality must be operable via keyboard.","evidence":"web","status":"active"},{"id":"r020","type":"risk","topic":"accessibility","content":"SSE-driven DOM updates happen silently — no aria-live regions announce changes to screen readers. When new claims arrive or the compiler status changes, sighted users see animations but screen reader users get zero notification. Adding aria-live='polite' to the scoreboard and timeline would fix this without disrupting the visual experience.","evidence":"web","status":"active"},{"id":"r021","type":"recommendation","topic":"accessibility","content":"Five targeted fixes would bring the dashboard to WCAG 2.2 AA: (1) Raise --text-dim from #505a6e to #7a839a (4.5:1 ratio). (2) Add semantic landmarks: <header> for topbar, <main> for layout, role='status' on scoreboard. (3) Add tabindex='0', role='button', aria-expanded, and keydown handler for Enter/Space on claim rows. (4) Add aria-live='polite' to scoreboard and timeline container. (5) Add :focus-visible outline styles to all interactive elements.","evidence":"web","status":"active"},{"id":"r022","type":"risk","topic":"accessibility","content":"The explainer template (templates/explainer.html) imports Google Fonts via @import url('https://fonts.googleapis.com/...'), which is both an external dependency (tension with d002 self-contained constraint) and an accessibility concern: if the CDN is unreachable, text may render in a fallback font with different metrics, potentially breaking layout. The template should use the system font stack already defined as fallback.","evidence":"web","status":"active"},{"id":"p009","type":"factual","topic":"accessibility","content":"All 5 WCAG 2.2 AA fixes implemented on the live dashboard in ~25 lines of changes: (1) --text-dim raised from #505a6e to #7a839a — now 5.08:1 on --bg, 4.68:1 on --surface (both pass AA). (2) Semantic landmarks added: <header> for topbar, <main> for layout, role='status' on scoreboard, role='region' on timeline. (3) Keyboard support: claim rows have tabindex='0', role='button', aria-expanded, Enter/Space keydown handler. (4) aria-live='polite' on scoreboard and timeline — screen readers announce SSE updates. (5) :focus-visible outlines on all interactive elements. Zero visual regression — design unchanged for sighted users.","evidence":"tested","status":"active"}],"coverage":{"accessibility":{"claims":7,"max_evidence":"tested","status":"strong","types":["factual","recommendation","risk"],"claim_ids":["r017","r018","r019","r020","r021","r022","p009"],"constraint_count":0,"source_origins":["prototype","research"],"source_count":2,"type_diversity":3,"missing_types":["constraint","estimate","feedback"]},"architecture":{"claims":12,"max_evidence":"tested","status":"strong","types":["factual","feedback","recommendation"],"claim_ids":["r002","r003","p001","p002","p004","f001","f003","r012","r013","r014","r015","r016"],"constraint_count":2,"source_origins":["prototype","research","stakeholder"],"source_count":3,"type_diversity":3,"missing_types":["constraint","estimate","risk"]},"audience":{"claims":1,"max_evidence":"stated","status":"weak","types":["constraint"],"claim_ids":["d003"],"constraint_count":1,"source_origins":["stakeholder"],"source_count":1,"type_diversity":1,"missing_types":["factual","estimate","risk","recommendation","feedback"]},"dogfooding":{"claims":2,"max_evidence":"tested","status":"strong","types":["constraint","factual"],"claim_ids":["d001","p005"],"constraint_count":1,"source_origins":["prototype","stakeholder"],"source_count":2,"type_diversity":2,"missing_types":["estimate","risk","recommendation","feedback"]},"output-format":{"claims":5,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","risk"],"claim_ids":["d002","r007","f002","r010","p008"],"constraint_count":2,"source_origins":["prototype","research","stakeholder"],"source_count":3,"type_diversity":4,"missing_types":["estimate","recommendation"]},"quality":{"claims":4,"max_evidence":"web","status":"weak","types":["constraint","factual","feedback","risk"],"claim_ids":["d005","f004","r009","r011"],"constraint_count":2,"source_origins":["research","stakeholder"],"source_count":2,"type_diversity":4,"missing_types":["estimate","recommendation"]},"scope":{"claims":1,"max_evidence":"stated","status":"weak","types":["constraint"],"claim_ids":["d004"],"constraint_count":1,"source_origins":["stakeholder"],"source_count":1,"type_diversity":1,"missing_types":["factual","estimate","risk","recommendation","feedback"]},"ux-pattern":{"claims":8,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","recommendation"],"claim_ids":["r004","r005","r006","p003","f005","p006","p007","f006"],"constraint_count":2,"source_origins":["prototype","research","stakeholder"],"source_count":3,"type_diversity":4,"missing_types":["estimate","risk"]}},"stats":{"total":42,"active":40,"conflicted":0,"superseded":2,"topics":8,"phase":"prototype","status":"ready"},"conflicts":{"resolved":1,"unresolved":0},"delta":{"added":["p009"],"removed":[],"upgraded":[{"topic":"accessibility","from":"web","to":"tested"}],"statusChanges":[],"newTopics":[]},"milestone":"accessibility: web -> tested"},{"index":16,"commit":{"hash":"69a572a","message":"wheat: /evaluate — added e001-e006, all topics at tested","date":"2026-03-11T03:14:12-05:00"},"claims":[{"id":"d001","type":"constraint","topic":"dogfooding","content":"The visualization must be built through the Wheat pipeline itself — claims, compiler, then artifact. It should demonstrate the system by being a product of it.","evidence":"stated","status":"active"},{"id":"d002","type":"constraint","topic":"output-format","content":"Output must be self-contained HTML (inline CSS/JS, no external dependencies) that can be opened directly in a browser.","evidence":"stated","status":"active"},{"id":"d003","type":"constraint","topic":"audience","content":"Target audience is a single developer seeing Wheat for the first time. The visualization should be self-explanatory without external docs.","evidence":"stated","status":"active"},{"id":"d004","type":"constraint","topic":"scope","content":"Full creative freedom — no budget, timeline, or tech constraints beyond self-contained HTML. Go as ambitious as needed.","evidence":"stated","status":"active"},{"id":"d005","type":"constraint","topic":"quality","content":"Success criteria is subjective — 'I'll know it when I see it.' The artifact must be visually compelling enough to sell itself on first impression.","evidence":"stated","status":"active"},{"id":"r002","type":"factual","topic":"architecture","content":"Node.js fs.watch uses OS-level file notifications (FSEvents on macOS, inotify on Linux). For watching a single file like claims.json, it is sufficient without chokidar. Zero dependencies needed.","evidence":"web","status":"active"},{"id":"r003","type":"factual","topic":"architecture","content":"Browser-only approaches (File System Access API) are not viable: Chrome-only, require manual file picker every session, and still need a server to trigger CLI commands. A server is unavoidable.","evidence":"web","status":"active"},{"id":"r004","type":"recommendation","topic":"ux-pattern","content":"Use AST Explorer's pattern: input on left (claims flowing in), compiled output on right (compilation result), updating in real time as data changes. This is the closest proven analogue to showing claims.json -> compiler -> compilation.json.","evidence":"web","status":"active"},{"id":"r005","type":"recommendation","topic":"ux-pattern","content":"For the compiler passes, use a linear pipeline stepper (like GitHub Actions) — stages shown left-to-right with status icons (pending/running/done/error). Color coding: green=pass, yellow=running, red=fail, grey=pending.","evidence":"web","status":"active"},{"id":"r006","type":"recommendation","topic":"ux-pattern","content":"Next.js HMR pattern: server sends lightweight notification with just a hash, browser fetches full data only when needed. For Wheat: SSE sends {event:'update', hash:'abc'}, client fetches /compilation.json. Avoids sending large payloads over SSE.","evidence":"web","status":"active"},{"id":"r007","type":"risk","topic":"output-format","content":"A live-updating UI requires a running server, which conflicts with the 'self-contained HTML' constraint (d002). Resolution: the server is the dev experience; the HTML it serves is still self-contained. Two artifacts: wheat-server.js (dev tool) + output HTML (portable artifact).","evidence":"web","status":"active"},{"id":"p001","type":"factual","topic":"architecture","content":"Working prototype: wheat-server.js is 133 lines (not ~80 as estimated). Still zero npm dependencies. Includes: HTTP server, SSE endpoint, fs.watch on claims.json, auto-compile, static file serving, git log endpoint.","evidence":"tested","status":"active"},{"id":"p002","type":"factual","topic":"architecture","content":"SSE auto-reconnect confirmed working: EventSource reconnects automatically when server restarts, no client-side retry logic needed. Browser handles it natively.","evidence":"tested","status":"active"},{"id":"p003","type":"factual","topic":"ux-pattern","content":"Split-pane layout works: left panel shows claims grouped by phase with type/evidence badges, right panel shows compiled output (coverage bars, conflicts, warnings, git log, certificate). Compiler stepper animates across the top on each update.","evidence":"tested","status":"active"},{"id":"p004","type":"factual","topic":"architecture","content":"fs.watch fires reliably on macOS for claims.json edits. 150ms debounce is sufficient to avoid double-fires. Compiler runs in ~50ms for 13 claims — instant feedback loop.","evidence":"tested","status":"active"},{"id":"p005","type":"factual","topic":"dogfooding","content":"The live dashboard successfully visualizes its own sprint. As prototype claims were added to claims.json, the dashboard updated in real time showing the new claims, updated coverage bars, and re-animated compiler stepper. Self-referential loop confirmed working.","evidence":"tested","status":"active"},{"id":"f001","type":"feedback","topic":"architecture","content":"User prefers the static file:// dashboard (output/dashboard.html) over the live SSE server (localhost:3141). The SSE server doesn't add enough value — most interaction is reading the current state, which the static HTML already shows well. The live server is over-engineered for the actual use pattern.","evidence":"stated","status":"active"},{"id":"f002","type":"feedback","topic":"output-format","content":"The self-contained HTML approach (file:// openable, no server needed) is actually the right call for this use case. The /status command already regenerates the dashboard on demand — that's sufficient. Real-time SSE updates are cool but unnecessary.","evidence":"stated","status":"active"},{"id":"f003","type":"feedback","topic":"architecture","content":"The live SSE server IS valuable as a dev-time tool — watching claims update in real time during a sprint is useful. The earlier preference for static (f001) was about the final artifact, not the dev experience. Both have a role: live server for working, static HTML for sharing.","evidence":"stated","status":"active"},{"id":"f004","type":"feedback","topic":"quality","content":"The live dashboard UI (localhost:3141) is too rudimentary — functional but not sleek. Needs a UX polish pass: the layout, typography, and visual hierarchy should feel as polished as the static /status dashboard, not like a debug tool.","evidence":"stated","status":"active"},{"id":"f005","type":"feedback","topic":"ux-pattern","content":"The dashboard needs a timeline-based UI — a visual narrative of the sprint's progression over time, not just a static grid of current state. Data-rich dashboards can be built without overwhelming the user by using progressive disclosure, timeline views, and visual hierarchy. The current layout dumps everything at once instead of telling a story.","evidence":"stated","status":"active"},{"id":"p006","type":"factual","topic":"ux-pattern","content":"Timeline-first dashboard prototype built: vertical timeline as primary UI spine, claims as expandable nodes grouped by phase (define/research/prototype/evaluate/feedback), progressive disclosure via click-to-expand detail panels. Compact scoreboard replaces the old card grid. Coverage shown as inline topic chips with evidence-tier colored dots. Conflict resolutions and warnings appear as inline timeline events. 'Now' node pulses at the bottom showing live watching state.","evidence":"tested","status":"active"},{"id":"p007","type":"factual","topic":"ux-pattern","content":"Phase-colored visual system confirmed effective: each sprint phase gets a distinct color (define=amber, research=blue, prototype=green, evaluate=purple, feedback=cyan) applied consistently to timeline dots, claim IDs, phase headers, and claim dot accents. Creates instant visual grouping without labels.","evidence":"tested","status":"active"},{"id":"f006","type":"constraint","topic":"ux-pattern","content":"New information (latest claims, events, compilations) should populate from the top of the timeline, not the bottom. Reverse chronological order — newest first, like a social feed or activity log. The user shouldn't have to scroll to see what just changed.","evidence":"stated","status":"active"},{"id":"r009","type":"factual","topic":"quality","content":"3 of 4 'weak evidence' compiler warnings are false alarms. Topics audience, scope, and quality consist entirely of constraint/feedback claims whose natural evidence tier is 'stated'. Constraints are stakeholder decisions, not testable hypotheses — 'stated' is their correct and final tier. The compiler's evidence tier system was designed for testable claims, not definitional boundaries.","evidence":"web","status":"active"},{"id":"r010","type":"factual","topic":"output-format","content":"The output-format topic is the only real evidence gap among the 4 warnings. It has a risk claim (r007) at web tier about server-vs-static tension. This is upgradeable to 'tested' by verifying that output/dashboard.html works as self-contained HTML: opens via file://, zero external network requests, all CSS/JS inline, works offline.","evidence":"web","status":"active"},{"id":"r011","type":"risk","topic":"quality","content":"The compiler's W_WEAK_EVIDENCE warning system has a semantic blind spot: it treats all claim types equally, but constraint claims (type: constraint, feedback) are inherently 'stated' tier and cannot be upgraded. This creates persistent false-positive warnings on constraint-heavy topics, reducing signal-to-noise ratio for future sprints.","evidence":"web","status":"active"},{"id":"r012","type":"recommendation","topic":"architecture","content":"The compiler should add constraint-aware coverage analysis: ve tabindex='0', role='button', aria-expanded, Enter/Space keydown handler. (4) aria-live='polite' on scoreboard and timeline — screen readers announce SSE updates. (5) :focus-visible outlines on all interactive elements. Zero visual regression — design unchanged for sighted users.","evidence":"tested","status":"active"},{"id":"e001","type":"factual","topic":"architecture","content":"Compiler scales linearly: 42 claims in 45ms, 100 in 44ms, 250 in 65ms, 500 in 50ms, 1000 in 59ms. Sub-60ms at 1000 claims means the feedback loop stays instant even for large sprints. The 7-pass pipeline has no exponential blowup — conflict detection is the only O(n^2) pass but stays fast due to sparse conflict graphs.","evidence":"tested","status":"active"},{"id":"e002","type":"risk","topic":"architecture","content":"Compiler crashes on empty or unparseable claims.json files (throws unhandled JSON parse error). Gracefully handles structural issues: missing claims array defaults to empty, missing meta defaults to empty, invalid claim fields produce BLOCKED status with errors. Two crash cases (empty file, malformed JSON) should be caught with a try/catch at the top level.","evidence":"tested","status":"active"},{"id":"e003","type":"factual","topic":"output-format","content":"All 7 HTML artifacts verified fully self-contained: zero external script src, link href, @import url, or img src pointing to external resources. Sizes range from 7.3KB (problem-statement) to 26.3KB (live dashboard). Every file opens correctly via file:// with no network requests. Constraint d002 is satisfied across the entire artifact set.","evidence":"tested","status":"active"},{"id":"e004","type":"factual","topic":"accessibility","content":"13/13 WCAG 2.2 AA checks pass on the live dashboard: lang attribute, <header> landmark, <main> landmark, role=status, role=region, aria-live=polite, aria-expanded, tabindex=0, role=button, onkeydown handler, :focus-visible styles, aria-label attributes, and contrast ratio >= 4.5 emoved":[],"upgraded":[{"topic":"quality","from":"web","to":"tested"}],"statusChanges":[],"newTopics":[]},"milestone":"Phase: prototype -> evaluate | +6 claims added | quality: web -> tested"},{"index":17,"commit":{"hash":"683ceb0","message":"wheat: /feedback \"loves samurai jack presentation\" — added f007","date":"2026-03-11T03:31:27-05:00"},"claims":[{"id":"d001","type":"constraint","topic":"dogfooding","content":"The visualization must be built through the Wheat pipeline itself — claims, compiler, then artifact. It should demonstrate the system by being a product of it.","evidence":"stated","status":"active"},{"id":"d002","type":"constraint","topic":"output-format","content":"Output must be self-contained HTML (inline CSS/JS, no external dependencies) that can be opened directly in a browser.","evidence":"stated","status":"active"},{"id":"d003","type":"constraint","topic":"audience","content":"Target audience is a single developer seeing Wheat for the first time. The visualization should be self-explanatory without external docs.","evidence":"stated","status":"active"},{"id":"d004","type":"constraint","topic":"scope","content":"Full creative freedom — no budget, timeline, or tech constraints beyond self-contained HTML. Go as ambitious as needed.","evidence":"stated","status":"active"},{"id":"d005","type":"constraint","topic":"quality","content":"Success criteria is subjective — 'I'll know it when I see it.' The artifact must be visually compelling enough to sell itself on first impression.","evidence":"stated","status":"active"},{"id":"r002","type":"factual","topic":"architecture","content":"Node.js fs.watch uses OS-level file notifications (FSEvents on macOS, inotify on Linux). For watching a single file like claims.json, it is sufficient without chokidar. Zero dependencies needed.","evidence":"web","status":"active"},{"id":"r003","type":"factual","topic":"architecture","content":"Browser-only approaches (File System Access API) are not viable: Chrome-only, require manual file picker every session, and still need a server to trigger CLI commands. A server is unavoidable.","evidence":"web","status":"active"},{"id":"r004","type":"recommendation","topic":"ux-pattern","content":"Use AST Explorer's pattern: input on left (claims flowing in), compiled output on right (compilation result), updating in real time as data changes. This is the closest proven analogue to showing claims.json -> compiler -> compilation.json.","evidence":"web","status":"active"},{"id":"r005","type":"recommendation","topic":"ux-pattern","content":"For the compiler passes, use a linear pipeline stepper (like GitHub Actions) — stages shown left-to-right with status icons (pending/running/done/error). Color coding: green=pass, yellow=running, red=fail, grey=pending.","evidence":"web","status":"active"},{"id":"r006","type":"recommendation","topic":"ux-pattern","content":"Next.js HMR pattern: server sends lightweight notification with just a hash, browser fetches full data only when needed. For Wheat: SSE sends {event:'update', hash:'abc'}, client fetches /compilation.json. Avoids sending large payloads over SSE.","evidence":"web","status":"active"},{"id":"r007","type":"risk","topic":"output-format","content":"A live-updating UI requires a running server, which conflicts with the 'self-contained HTML' constraint (d002). Resolution: the server is the dev experience; the HTML it serves is still self-contained. Two artifacts: wheat-server.js (dev tool) + output HTML (portable artifact).","evidence":"web","status":"active"},{"id":"p001","type":"factual","topic":"architecture","content":"Working prototype: wheat-server.js is 133 lines (not ~80 as estimated). Still zero npm dependencies. Includes: HTTP server, SSE endpoint, fs.watch on claims.json, auto-compile, static file serving, git log endpoint.","evidence":"tested","status":"active"},{"id":"p002","type":"factual","topic":"architecture","content":"SSE auto-reconnect confirmed working: EventSource reconnects automatically when server restarts, no client-side retry logic needed. Browser handles it natively.","evidence":"tested","status":"active"},{"id":"p003","type":"factual","topic":"ux-pattern","content":"Split-pane layout works: left panel shows claims grouped by phase with type/evidence badges, right panel shows compiled output (coverage bars, conflicts, warnings, git log, certificate). Compiler stepper animates across the top on each update.","evidence":"tested","status":"active"},{"id":"p004","type":"factual","topic":"architecture","content":"fs.watch fires reliably on macOS for claims.json edits. 150ms debounce is sufficient to avoid double-fires. Compiler runs in ~50ms for 13 claims — instant feedback loop.","evidence":"tested","status":"active"},{"id":"p005","type":"factual","topic":"dogfooding","content":"The live dashboard successfully visualizes its own sprint. As prototype claims were added to claims.json, the dashboard updated in real time showing the new claims, updated coverage bars, and re-animated compiler stepper. Self-referential loop confirmed working.","evidence":"tested","status":"active"},{"id":"f001","type":"feedback","topic":"architecture","content":"User prefers the static file:// dashboard (output/dashboard.html) over the live SSE server (localhost:3141). The SSE server doesn't add enough value — most interaction is reading the current state, which the static HTML already shows well. The live server is over-engineered for the actual use pattern.","evidence":"stated","status":"active"},{"id":"f002","type":"feedback","topic":"output-format","content":"The self-contained HTML approach (file:// openable, no server needed) is actually the right call for this use case. The /status command already regenerates the dashboard on demand — that's sufficient. Real-time SSE updates are cool but unnecessary.","evidence":"stated","status":"active"},{"id":"f003","type":"feedback","topic":"architecture","content":"The live SSE server IS valuable as a dev-time tool — watching claims update in real time during a sprint is useful. The earlier preference for static (f001) was about the final artifact, not the dev experience. Both have a role: live server for working, static HTML for sharing.","evidence":"stated","status":"active"},{"id":"f004","type":"feedback","topic":"quality","content":"The live dashboard UI (localhost:3141) is too rudimentary — functional but not sleek. Needs a UX polish pass: the layout, typography, and visual hierarchy should feel as polished as the static /status dashboard, not like a debug tool.","evidence":"stated","status":"active"},{"id":"f005","type":"feedback","topic":"ux-pattern","content":"The dashboard needs a timeline-based UI — a visual narrative of the sprint's progression over time, not just a static grid of current state. Data-rich dashboards can be built without overwhelming the user by using progressive disclosure, timeline views, and visual hierarchy. The current layout dumps everything at once instead of telling a story.","evidence":"stated","status":"active"},{"id":"p006","type":"factual","topic":"ux-pattern","content":"Timeline-first dashboard prototype built: vertical timeline as primary UI spine, claims as expandable nodes grouped by phase (define/research/prototype/evaluate/feedback), progressive disclosure via click-to-expand detail panels. Compact scoreboard replaces the old card grid. Coverage shown as inline topic chips with evidence-tier colored dots. Conflict resolutions and warnings appear as inline timeline events. 'Now' node pulses at the bottom showing live watching state.","evidence":"tested","status":"active"},{"id":"p007","type":"factual","topic":"ux-pattern","content":"Phase-colored visual system confirmed effective: each sprint phase gets a distinct color (define=amber, research=blue, prototype=green, evaluate=purple, feedback=cyan) applied consistently to timeline dots, claim IDs, phase headers, and claim dot accents. Creates instant visual grouping without labels.","evidence":"tested","status":"active"},{"id":"f006","type":"constraint","topic":"ux-pattern","content":"New information (latest claims, events, compilations) should populate from the top of the timeline, not the bottom. Reverse chronological order — newest first, like a social feed or activity log. The user shouldn't have to scroll to see what just changed.","evidence":"stated","status":"active"},{"id":"r009","type":"factual","topic":"quality","content":"3 of 4 'weak evidence' compiler warnings are false alarms. Topics audience, scope, and quality consist entirely of constraint/feedback claims whose natural evidence tier is 'stated'. Constraints are stakeholder decisions, not testable hypotheses — 'stated' is their correct and final tier. The compiler's evidence tier system was designed for testable claims, not definitional boundaries.","evidence":"web","status":"active"},{"id":"r010","type":"factual","topic":"output-format","content":"The output-format topic is the only real evidence gap among the 4 warnings. It has a risk claim (r007) at web tier about server-vs-static tension. This is upgradeable to 'tested' by verifying that output/dashboard.html works as self-contained HTML: opens via file://, zero external network requests, all CSS/JS inline, works offline.","evidence":"web","status":"active"},{"id":"r011","type":"risk","topic":"quality","content":"The compiler's W_WEAK_EVIDENCE warning system has a semantic blind spot: it treats all claim types equally, but constraint claims (type: constraint, feedback) are inherently 'stated' tier and cannot be upgraded. This creates persistent false-positive warnings on constraint-heavy topics, reducing signal-to-noise ratio for future sprints.","evidence":"web","status":"active"},{"id":"r012","type":"recommendation","topic":"architecture","content":"The compiler should add constraint-aware coverage analysis: topics where >50% of claims are type 'constraint' or 'feedback' should not emit W_WEAK_EVIDENCE. Instead, emit W_CONSTRAINT_ONLY as an informational note. This preserves the warning for genuinely under-researched topics while silencing noise on definitional ones.","evidence":"web","status":"active"},{"id":"p008","type":"factual","topic":"output-format","content":"All 4 static HTML artifacts (output/dashboard.html, output/problem-statement.html, research/live-ui-architecture.html, research/evidence-gap-analysis.html) verified fully self-contained: zero external URLs, zero <script src=>, zero <link href=>, zero <img src=> pointing to external resources. All CSS and JS are inline. Every file opens correctly via file:// protocol with no network requests. The self-contained HTML constraint (d002) is confirmed satisfied.","evidence":"tested","status":"active"},{"id":"r013","type":"factual","topic":"architecture","content":"Wheat command suite expanded from 10 to 17 commands organized in 3 tiers: Tier 1 (Sprint Lifecycle) has 10 original commands for the define→research→prototype→evaluate→ship pipeline. Tier 2 (Quality Assurance) adds 4 new commands (/challenge, /blind-spot, /witness, /calibrate) for adversarial testing and corroboration. Tier 3 (Operations) adds 3 new commands (/replay, /handoff, /merge) for multi-sprint and multi-person workflows.","evidence":"documented","status":"active"},{"id":"r014","type":"factual","topic":"architecture","content":"Compiler grew from ~430 lines (v0.1.0) to 685 lines (v0.2.0) with 9 new capabilities: --input/--output flags, --diff mode, source diversity tracking, type diversity tracking, corroboration system, constraint-aware coverage (W_CONSTRAINT_ONLY), wheat.config.json support, burn-residue safety check, and module exports for library usage. Still zero npm dependencies.","evidence":"documented","status":"active"},{"id":"r015","type":"factual","topic":"architecture","content":"Claim ID namespace expanded from 5 to 9 prefixes: original d### (define), r### (research), p### (prototype), e### (evaluate), f### (feedback); new x### (challenge), w### (witness), cal### (calibrate); plus burn- synthetic prefix rejected by compiler safety check.","evidence":"documented","status":"active"},{"id":"r016","type":"recommendation","topic":"architecture","content":"The Tier 2 QA commands create three feedback loops: (1) self-correction (/challenge → conflict → /resolve), (2) external validation (/witness → corroboration count), (3) meta-learning (/calibrate → scores predictions against production → validates whether evidence tiers predict accuracy). The /calibrate loop is unique — it's the only command that tests whether Wheat itself works.","evidence":"documented","status":"active"},{"id":"r017","type":"factual","topic":"accessibility","content":"The dashboard's --text-dim color (#505a6e on #0a0e1a) has a contrast ratio of 2.78:1, failing WCAG 2.2 AA minimum of 4.5:1 for normal text and 3:1 for UI components. This color is used for metadata labels, tags, phase subtitles, and the 'Now' timestamp — all informational text that becomes unreadable for users with low vision or contrast sensitivity.","evidence":"web","status":"active"},{"id":"r018","type":"risk","topic":"accessibility","content":"The dashboard has zero ARIA landmarks or semantic HTML. All structure uses <div> elements — no <main>, <header>, <nav>, no role attributes. Screen reader users cannot navigate by region, skip to main content, or understand the page structure. This violates WCAG 2.2 SC 1.3.1 (Info and Relationships) and makes the dashboard effectively unusable with assistive technology.","evidence":"web","status":"active"},{"id":"r019","type":"risk","topic":"accessibility","content":"Claim rows use onclick handlers on <div> elements with no keyboard support. No tabindex, no role='button', no Enter/Space key handlers. Keyboard-only users cannot expand claim details. This violates WCAG 2.2 SC 2.1.1 (Keyboard) — all functionality must be operable via keyboard.","evidence":"web","status":"active"},{"id":"r020","type":"risk","topic":"accessibility","content":"SSE-driven DOM updates happen silently — no aria-live regions announce changes to screen readers. When new claims arrive or the compiler status changes, sighted users see animations but screen reader users get zero notification. Adding aria-live='polite' to the scoreboard and timeline would fix this without disrupting the visual experience.","evidence":"web","status":"active"},{"id":"r021","type":"recommendation","topic":"accessibility","content":"Five targeted fixes would bring the dashboard to WCAG 2.2 AA: (1) Raise --text-dim from #505a6e to #7a839a (4.5:1 ratio). (2) Add semantic landmarks: <header> for topbar, <main> for layout, role='status' on scoreboard. (3) Add tabindex='0', role='button', aria-expanded, and keydown handler for Enter/Space on claim rows. (4) Add aria-live='polite' to scoreboard and timeline container. (5) Add :focus-visible outline styles to all interactive elements.","evidence":"web","status":"active"},{"id":"r022","type":"risk","topic":"accessibility","content":"The explainer template (templates/explainer.html) imports Google Fonts via @import url('https://fonts.googleapis.com/...'), which is both an external dependency (tension with d002 self-contained constraint) and an accessibility concern: if the CDN is unreachable, text may render in a fallback font with different metrics, potentially breaking layout. The template should use the system font stack already defined as fallback.","evidence":"web","status":"active"},{"id":"p009","type":"factual","topic":"accessibility","content":"All 5 WCAG 2.2 AA fixes implemented on the live dashboard in ~25 lines of changes: (1) --text-dim raised from #505a6e to #7a839a — now 5.08:1 on --bg, 4.68:1 on --surface (both pass AA). (2) Semantic landmarks added: <header> for topbar, <main> for layout, role='status' on scoreboard, role='region' on timeline. (3) Keyboard support: claim rows have tabindex='0', role='button', aria-expanded, Enter/Space keydown handler. (4) aria-live='polite' on scoreboard and timeline — screen readers announce SSE updates. (5) :focus-visible outlines on all interactive elements. Zero visual regression — design unchanged for sighted users.","evidence":"tested","status":"active"},{"id":"e001","type":"factual","topic":"architecture","content":"Compiler scales linearly: 42 claims in 45ms, 100 in 44ms, 250 in 65ms, 500 in 50ms, 1000 in 59ms. Sub-60ms at 1000 claims means the feedback loop stays instant even for large sprints. The 7-pass pipeline has no exponential blowup — conflict detection is the only O(n^2) pass but stays fast due to sparse conflict graphs.","evidence":"tested","status":"active"},{"id":"e002","type":"risk","topic":"architecture","content":"Compiler crashes on empty or unparseable claims.json files (throws unhandled JSON parse error). Gracefully handles structural issues: missing claims array defaults to empty, missing meta defaults to empty, invalid claim fields produce BLOCKED status with errors. Two crash cases (empty file, malformed JSON) should be caught with a try/catch at the top level.","evidence":"tested","status":"active"},{"id":"e003","type":"factual","topic":"output-format","content":"All 7 HTML artifacts verified fully self-contained: zero external script src, link href, @import url, or img src pointing to external resources. Sizes range from 7.3KB (problem-statement) to 26.3KB (live dashboard). Every file opens correctly via file:// with no network requests. Constraint d002 is satisfied across the entire artifact set.","evidence":"tested","status":"active"},{"id":"e004","type":"factual","topic":"accessibility","content":"13/13 WCAG 2.2 AA checks pass on the live dashboard: lang attribute, <header> landmark, <main> landmark, role=status, role=region, aria-live=polite, aria-expanded, tabindex=0, role=button, onkeydown handler, :focus-visible styles, aria-label attributes, and contrast ratio >= 4.5:1. The accessibility research claims (r017-r022) are confirmed implemented and working.","evidence":"tested","status":"active"},{"id":"e005","type":"factual","topic":"dogfooding","content":"The sprint successfully dogfoods itself: 20/42 claims are self-referential (reference the dashboard, Wheat, or the sprint itself). 16 wheat-format git commits trace the full event log. 4 of 5 phases exercised (define, research, prototype, feedback — evaluate now being added). 8 topics covered, 8 artifacts generated, 1 conflict auto-resolved. The visualization demonstrates the framework by being a product of it — constraint d001 is satisfied.","evidence":"tested","status":"active"},{"id":"e006","type":"factual","topic":"quality","content":"Evidence distribution across 40 active claims: stated=11 (27.5%), web=17 (42.5%), documented=4 (10%), tested=9 (22.5%), production=0. The tested tier is the highest reached. 5 of 8 topics have tested-level evidence. The constraint-dominated topics (audience, scope) correctly remain at stated. The quality topic remains at web — the only genuine evidence gap.","evidence":"tested","status":"active"},{"id":"f007","type":"feedback","topic":"quality","content":"Stakeholder loves the Samurai Jack-themed presentation, specifically the 'Compiled by Wheat — gotta get back, back to the past' tagline. The thematic approach (kanji watermarks, brush-stroke dividers, woodblock panel aesthetic) resonates — personality in output artifacts makes the framework more memorable and shareable. This validates the 'I'll know it when I see it' quality bar (d005).","evidence":"stated","status":"active"}],"coverage":{"accessibility":{"claims":8,"max_evidence":"tested","status":"strong","types":["factual","recommendation","risk"],"claim_ids":["r017","r018","r019","r020","r021","r022","p009","e004"],"constraint_count":0,"source_origins":["evaluation","prototype","research"],"source_count":3,"type_diversity":3,"missing_types":["constraint","estimate","feedback"]},"architecture":{"claims":14,"max_evidence":"tested","status":"strong","types":["factual","feedback","recommendation","risk"],"
