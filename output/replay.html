 dev experience. Both have a role: live server for working, static HTML for sharing.","evidence":"stated","status":"active"},{"id":"f004","type":"feedback","topic":"quality","content":"The live dashboard UI (localhost:3141) is too rudimentary — functional but not sleek. Needs a UX polish pass: the layout, typography, and visual hierarchy should feel as polished as the static /status dashboard, not like a debug tool.","evidence":"stated","status":"active"},{"id":"f005","type":"feedback","topic":"ux-pattern","content":"The dashboard needs a timeline-based UI — a visual narrative of the sprint's progression over time, not just a static grid of current state. Data-rich dashboards can be built without overwhelming the user by using progressive disclosure, timeline views, and visual hierarchy. The current layout dumps everything at once instead of telling a story.","evidence":"stated","status":"active"},{"id":"p006","type":"factual","topic":"ux-pattern","content":"Timeline-first dashboard prototype built: vertical timeline as primary UI spine, claims as expandable nodes grouped by phase (define/research/prototype/evaluate/feedback), progressive disclosure via click-to-expand detail panels. Compact scoreboard replaces the old card grid. Coverage shown as inline topic chips with evidence-tier colored dots. Conflict resolutions and warnings appear as inline timeline events. 'Now' node pulses at the bottom showing live watching state.","evidence":"tested","status":"active"},{"id":"p007","type":"factual","topic":"ux-pattern","content":"Phase-colored visual system confirmed effective: each sprint phase gets a distinct color (define=amber, research=blue, prototype=green, evaluate=purple, feedback=cyan) applied consistently to timeline dots, claim IDs, phase headers, and claim dot accents. Creates instant visual grouping without labels.","evidence":"tested","status":"active"},{"id":"f006","type":"constraint","topic":"ux-pattern","content":"New information (latest claims, events, compilations) should populate from the top of the timeline, not the bottom. Reverse chronological order — newest first, like a social feed or activity log. The user shouldn't have to scroll to see what just changed.","evidence":"stated","status":"active"},{"id":"r009","type":"factual","topic":"quality","content":"3 of 4 'weak evidence' compiler warnings are false alarms. Topics audience, scope, and quality consist entirely of constraint/feedback claims whose natural evidence tier is 'stated'. Constraints are stakeholder decisions, not testable hypotheses — 'stated' is their correct and final tier. The compiler's evidence tier system was designed for testable claims, not definitional boundaries.","evidence":"web","status":"active"},{"id":"r010","type":"factual","topic":"output-format","content":"The output-format topic is the only real evidence gap among the 4 warnings. It has a risk claim (r007) at web tier about server-vs-static tension. This is upgradeable to 'tested' by verifying that output/dashboard.html works as self-contained HTML: opens via file://, zero external network requests, all CSS/JS inline, works offline.","evidence":"web","status":"active"},{"id":"r011","type":"risk","topic":"quality","content":"The compiler's W_WEAK_EVIDENCE warning system has a semantic blind spot: it treats all claim types equally, but constraint claims (type: constraint, feedback) are inherently 'stated' tier and cannot be upgraded. This creates persistent false-positive warnings on constraint-heavy topics, reducing signal-to-noise ratio for future sprints.","evidence":"web","status":"active"},{"id":"r012","type":"recommendation","topic":"architecture","content":"The compiler should add constraint-aware coverage analysis: topics where >50% of claims are type 'constraint' or 'feedback' should not emit W_WEAK_EVIDENCE. Instead, emit W_CONSTRAINT_ONLY as an informational note. This preserves the warning for genuinely under-researched topics while silencing noise on definitional ones.","evidence":"web","status":"active"},{"id":"p008","type":"factual","topic":"output-format","content":"All 4 static HTML artifacts (output/dashboard.html, output/problem-statement.html, research/live-ui-architecture.html, research/evidence-gap-analysis.html) verified fully self-contained: zero external URLs, zero <script src=>, zero <link href=>, zero <img src=> pointing to external resources. All CSS and JS are inline. Every file opens correctly via file:// protocol with no network requests. The self-contained HTML constraint (d002) is confirmed satisfied.","evidence":"tested","status":"active"},{"id":"r013","type":"factual","topic":"architecture","content":"Wheat command suite expanded from 10 to 17 commands organized in 3 tiers: Tier 1 (Sprint Lifecycle) has 10 original commands for the define→research→prototype→evaluate→ship pipeline. Tier 2 (Quality Assurance) adds 4 new commands (/challenge, /blind-spot, /witness, /calibrate) for adversarial testing and corroboration. Tier 3 (Operations) adds 3 new commands (/replay, /handoff, /merge) for multi-sprint and multi-person workflows.","evidence":"documented","status":"active"},{"id":"r014","type":"factual","topic":"architecture","content":"Compiler grew from ~430 lines (v0.1.0) to 685 lines (v0.2.0) with 9 new capabilities: --input/--output flags, --diff mode, source diversity tracking, type diversity tracking, corroboration system, constraint-aware coverage (W_CONSTRAINT_ONLY), wheat.config.json support, burn-residue safety check, and module exports for library usage. Still zero npm dependencies.","evidence":"documented","status":"active"},{"id":"r015","type":"factual","topic":"architecture","content":"Claim ID namespace expanded from 5 to 9 prefixes: original d### (define), r### (research), p### (prototype), e### (evaluate), f### (feedback); new x### (challenge), w### (witness), cal### (calibrate); plus burn- synthetic prefix rejected by compiler safety check.","evidence":"documented","status":"active"},{"id":"r016","type":"recommendation","topic":"architecture","content":"The Tier 2 QA commands create three feedback loops: (1) self-correction (/challenge → conflict → /resolve), (2) external validation (/witness → corroboration count), (3) meta-learning (/calibrate → scores predictions against production → validates whether evidence tiers predict accuracy). The /calibrate loop is unique — it's the only command that tests whether Wheat itself works.","evidence":"documented","status":"active"},{"id":"r017","type":"factual","topic":"accessibility","content":"The dashboard's --text-dim color (#505a6e on #0a0e1a) has a contrast ratio of 2.78:1, failing WCAG 2.2 AA minimum of 4.5:1 for normal text and 3:1 for UI components. This color is used for metadata labels, tags, phase subtitles, and the 'Now' timestamp — all informational text that becomes unreadable for users with low vision or contrast sensitivity.","evidence":"web","status":"active"},{"id":"r018","type":"risk","topic":"accessibility","content":"The dashboard has zero ARIA landmarks or semantic HTML. All structure uses <div> elements — no <main>, <header>, <nav>, no role attributes. Screen reader users cannot navigate by region, skip to main content, or understand the page structure. This violates WCAG 2.2 SC 1.3.1 (Info and Relationships) and makes the dashboard effectively unusable with assistive technology.","evidence":"web","status":"active"},{"id":"r019","type":"risk","topic":"accessibility","content":"Claim rows use onclick handlers on <div> elements with no keyboard support. No tabindex, no role='button', no Enter/Space key handlers. Keyboard-only users cannot expand claim details. This violates WCAG 2.2 SC 2.1.1 (Keyboard) — all functionality must be operable via keyboard.","evidence":"web","status":"active"},{"id":"r020","type":"risk","topic":"accessibility","content":"SSE-driven DOM updates happen silently — no aria-live regions announce changes to screen readers. When new claims arrive or the compiler status changes, sighted users see animations but screen reader users get zero notification. Adding aria-live='polite' to the scoreboard and timeline would fix this without disrupting the visual experience.","evidence":"web","status":"active"},{"id":"r021","type":"recommendation","topic":"accessibility","content":"Five targeted fixes would bring the dashboard to WCAG 2.2 AA: (1) Raise --text-dim from #505a6e to #7a839a (4.5:1 ratio). (2) Add semantic landmarks: <header> for topbar, <main> for layout, role='status' on scoreboard. (3) Add tabindex='0', role='button', aria-expanded, and keydown handler for Enter/Space on claim rows. (4) Add aria-live='polite' to scoreboard and timeline container. (5) Add :focus-visible outline styles to all interactive elements.","evidence":"web","status":"active"},{"id":"r022","type":"risk","topic":"accessibility","content":"The explainer template (templates/explainer.html) imports Google Fonts via @import url('https://fonts.googleapis.com/...'), which is both an external dependency (tension with d002 self-contained constraint) and an accessibility concern: if the CDN is unreachable, text may render in a fallback font with different metrics, potentially breaking layout. The template should use the system font stack already defined as fallback.","evidence":"web","status":"active"},{"id":"p009","type":"factual","topic":"accessibility","content":"All 5 WCAG 2.2 AA fixes implemented on the live dashboard in ~25 lines of changes: (1) --text-dim raised from #505a6e to #7a839a — now 5.08:1 on --bg, 4.68:1 on --surface (both pass AA). (2) Semantic landmarks added: <header> for topbar, <main> for layout, role='status' on scoreboard, role='region' on timeline. (3) Keyboard support: claim rows have tabindex='0', role='button', aria-expanded, Enter/Space keydown handler. (4) aria-live='polite' on scoreboard and timeline — screen readers announce SSE updates. (5) :focus-visible outlines on all interactive elements. Zero visual regression — design unchanged for sighted users.","evidence":"tested","status":"active"},{"id":"e001","type":"factual","topic":"architecture","content":"Compiler scales linearly: 42 claims in 45ms, 100 in 44ms, 250 in 65ms, 500 in 50ms, 1000 in 59ms. Sub-60ms at 1000 claims means the feedback loop stays instant even for large sprints. The 7-pass pipeline has no exponential blowup — conflict detection is the only O(n^2) pass but stays fast due to sparse conflict graphs.","evidence":"tested","status":"active"},{"id":"e002","type":"risk","topic":"architecture","content":"Compiler crashes on empty or unparseable claims.json files (throws unhandled JSON parse error). Gracefully handles structural issues: missing claims array defaults to empty, missing meta defaults to empty, invalid claim fields produce BLOCKED status with errors. Two crash cases (empty file, malformed JSON) should be caught with a try/catch at the top level.","evidence":"tested","status":"active"},{"id":"e003","type":"factual","topic":"output-format","content":"All 7 HTML artifacts verified fully self-contained: zero external script src, link href, @import url, or img src pointing to external resources. Sizes range from 7.3KB (problem-statement) to 26.3KB (live dashboard). Every file opens correctly via file:// with no network requests. Constraint d002 is satisfied across the entire artifact set.","evidence":"tested","status":"active"},{"id":"e004","type":"factual","topic":"accessibility","content":"13/13 WCAG 2.2 AA checks pass on the live dashboard: lang attribute, <header> landmark, <main> landmark, role=status, role=region, aria-live=polite, aria-expanded, tabindex=0, role=button, onkeydown handler, :focus-visible styles, aria-label attributes, and contrast ratio >= 4.5:1. The accessibility research claims (r017-r022) are confirmed implemented and working.","evidence":"tested","status":"active"},{"id":"e005","type":"factual","topic":"dogfooding","content":"The sprint successfully dogfoods itself: 20/42 claims are self-referential (reference the dashboard, Wheat, or the sprint itself). 16 wheat-format git commits trace the full event log. 4 of 5 phases exercised (define, research, prototype, feedback — evaluate now being added). 8 topics covered, 8 artifacts generated, 1 conflict auto-resolved. The visualization demonstrates the framework by being a product of it — constraint d001 is satisfied.","evidence":"tested","status":"active"},{"id":"e006","type":"factual","topic":"quality","content":"Evidence distribution across 40 active claims: stated=11 (27.5%), web=17 (42.5%), documented=4 (10%), tested=9 (22.5%), production=0. The tested tier is the highest reached. 5 of 8 topics have tested-level evidence. The constraint-dominated topics (audience, scope) correctly remain at stated. The quality topic remains at web — the only genuine evidence gap.","evidence":"tested","status":"active"},{"id":"f007","type":"feedback","topic":"quality","content":"Stakeholder loves the Samurai Jack-themed presentation, specifically the 'Compiled by Wheat — gotta get back, back to the past' tagline. The thematic approach (kanji watermarks, brush-stroke dividers, woodblock panel aesthetic) resonates — personality in output artifacts makes the framework more memorable and shareable. This validates the 'I'll know it when I see it' quality bar (d005).","evidence":"stated","status":"active"},{"id":"x001","type":"risk","topic":"dogfooding","content":"The self-referential dogfooding creates a circular dependency: the dashboard's value proposition depends on the sprint being interesting, but the sprint's interest depends on the dashboard working. If a future sprint has a boring question or few claims, the dashboard looks empty and the teaching effect collapses. Dogfooding only works when there's enough data to visualize.","evidence":"web","status":"active"},{"id":"x002","type":"risk","topic":"ux-pattern","content":"The timeline-first UI assumes claims arrive chronologically with clear phase boundaries. In practice, sprints are messy: researchers revisit define-phase assumptions, prototypes generate new research questions, feedback arrives mid-prototype. The clean phase→phase timeline may misrepresent the actual nonlinear workflow, giving new users a false impression of Wheat's linearity.","evidence":"web","status":"active"},{"id":"w001","type":"factual","topic":"architecture","content":"External corroboration for p001: SSE with zero-dependency Node.js is the established pattern for real-time dashboards. DigitalOcean, dev.to, and multiple 2024-2025 tutorials confirm native http + EventSource as the standard approach — no Express or socket.io needed. The 133-line server size is consistent with community examples (80-150 lines typical).","evidence":"web","status":"active"},{"id":"p010","type":"factual","topic":"accessibility","content":"Google Fonts @import removed from both templates (explainer.html, dashboard.html). Replaced with system font stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif. Zero external requests. Resolves r022 risk and strengthens d002 self-contained constraint. All generated HTML artifacts were already clean — only the source templates had the import.","evidence":"tested","status":"active"},{"id":"x003","type":"risk","topic":"output-format","content":"The '7/7 self-contained' verification (e003) is a point-in-time snapshot — every new HTML artifact generated by future slash commands could reintroduce external dependencies if templates aren't checked. The explainer template had Google Fonts until p010 fixed it. There is no automated guard: no pre-commit hook or compiler pass that scans output HTML for external URLs. Self-containment could silently regress.","evidence":"web","status":"active"},{"id":"w002","type":"factual","topic":"architecture","content":"External corroboration for p002: MDN and the WHATWG HTML Living Standard confirm EventSource auto-reconnects natively with ~3s default retry. The server can tune retry via the retry: field, and the browser sends Last-Event-ID on reconnect for resumption. One caveat: auto-reconnect only fires on network failure, not on HTTP error responses (e.g. 500).","evidence":"web","status":"active"},{"id":"x004","type":"risk","topic":"architecture","content":"The scalability benchmark (e001: 59ms at 1000 claims) measures compilation time only — it ignores the full loop cost: file I/O to read claims.json (grows linearly with file size), JSON.parse (superlinear for large strings), writing compilation.json, and the browser re-rendering the dashboard DOM. At 1000 claims the JSON file would be ~500KB and the dashboard would have 1000+ DOM nodes. The bottleneck shifts from compiler to I/O and rendering well before 1000 claims.","evidence":"web","status":"active"},{"id":"x005","type":"risk","topic":"ux-pattern","content":"The timeline-first UI (p006) assumes a single-user, single-session workflow. If multiple contributors run /research or /prototype concurrently (e.g. pair programming or async collaboration), the timeline will interleave claims from different people with no attribution. There's no claim-level author tracking — the timeline shows what happened but not who did it, making collaborative sprints opaque.","evidence":"web","status":"active"},{"id":"p011","type":"factual","topic":"output-format","content":"Automated self-containment guard implemented: `node wheat-compiler.js --scan` checks all HTML files across output/, research/, evidence/, and prototypes/ for external URLs in script src, link href, @import url, and img src. Scans 10 HTML files, reports clean/dirty with specific URLs. Exits 1 on violation. Directly resolves x003 regression risk.","evidence":"tested","status":"active"},{"id":"w003","type":"factual","topic":"ux-pattern","content":"External corroboration for p003: AST Explorer (astexplorer.net) is the canonical example of the split-pane input→output pattern for code visualization. Left pane for source input, right pane for parsed output, real-time updates as you type. The pattern is widely adopted: TypeScript AST Viewer, SQL Parser, Scalameta all use the same layout. Wheat's claims→compilation split-pane follows this established convention.","evidence":"web","status":"active"},{"id":"w004","type":"factual","topic":"architecture","content":"External corroboration for p004: Node.js GitHub issue #47058 documents benchmarks showing fs.watch is reliable for single-file watching on macOS. Community consensus is that chokidar is only needed for recursive directory watching or cross-platform edge cases — for a single file like claims.json, native fs.watch with debounce is the recommended zero-dependency approach.","evidence":"web","status":"active"},{"id":"w005","type":"factual","topic":"dogfooding","content":"External corroboration for p005: The self-referential dogfooding pattern is well-established. Keen IO built 'analytics for your analytics' — their Native Analytics dashboard displayed by their own analytics platform. GitLab dogfoods their Insights visualization tool internally. Bubble builds their entire website on their own platform. Wheat's 'dashboard that displays claims about itself' follows this proven pattern of tools demonstrating their own capabilities.","evidence":"web","status":"active"},{"id":"w006","type":"factual","topic":"ux-pattern","content":"External corroboration for p006: Timeline-first layouts with progressive disclosure are an established UX pattern. Interaction Design Foundation, LogRocket, and Material UI all document vertical timelines with expandable nodes grouped by phase/stage as a standard approach for activity feeds and chronological dashboards. Accordions and click-to-expand are the canonical progressive disclosure mechanism for managing information density.","evidence":"web","status":"active"},{"id":"w007","type":"factual","topic":"ux-pattern","content":"External corroboration for p007: Atlassian, Sigma Computing, and Datawrapper all document categorical color coding as the standard data visualization practice. Best practice is 5-7 distinct hues for categorical grouping — Wheat's 5-phase color system (amber, blue, green, purple, cyan) falls exactly in this range. Consistent color-to-category mapping across a dashboard is explicitly recommended for visual grouping without labels.","evidence":"web","status":"active"},{"id":"w008","type":"factual","topic":"output-format","content":"External corroboration for p008: Self-contained single-file HTML is an established distribution pattern. Multiple tools exist specifically for this (vite-plugin-singlefile, Inliner.js, HtmlPackager, webpage2html). Use cases include reports, presentations, and offline-first apps — exactly Wheat's use case. The approach of inlining all CSS/JS with zero external dependencies is the standard solution for portable, shareable HTML artifacts.","evidence":"web","status":"active"},{"id":"w009","type":"factual","topic":"accessibility","content":"External corroboration for p009: WebAIM's WCAG 2 Checklist confirms the 5-fix approach (contrast, landmarks, keyboard, aria-live, focus styles) as the standard WCAG 2.2 AA remediation pattern. These are consistently listed as the top quick-wins for dashboard accessibility. The approach of fixing contrast ratios, adding semantic HTML, enabling keyboard nav, announcing dynamic updates, and styling focus indicators is the universally recommended minimum for AA compliance.","evidence":"web","status":"active"},{"id":"w010","type":"factual","topic":"architecture","content":"External corroboration for e001: Benchmarks from esbuild/SWC/Babel comparisons confirm that lightweight Node.js build pipelines processing structured data (JSON, AST) achieve sub-100ms times for thousands of items. The wheat compiler's 59ms at 1000 claims is consistent with expected performance for a 7-pass pipeline over in-memory JSON — no exotic optimization needed, just linear traversal.","evidence":"web","status":"active"}],"coverage":{"accessibility":{"claims":10,"max_evidence":"tested","status":"strong","types":["factual","recommendation","risk"],"claim_ids":["r017","r018","r019","r020","r021","r022","p009","e004","p010","w009"],"constraint_count":0,"source_origins":["evaluation","prototype","research","witness"],"source_count":4,"type_diversity":3,"missing_types":["constraint","estimate","feedback"]},"architecture":{"claims":19,"max_evidence":"tested","status":"strong","types":["factual","feedback","recommendation","risk"],"claim_ids":["r002","r003","p001","p002","p004","f001","f003","r012","r013","r014","r015","r016","e001","e002","w001","w002","x004","w004","w010"],"constraint_count":2,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":4,"missing_types":["constraint","estimate"]},"audience":{"claims":1,"max_evidence":"stated","status":"weak","types":["constraint"],"claim_ids":["d003"],"constraint_count":1,"source_origins":["stakeholder"],"source_count":1,"type_diversity":1,"missing_types":["factual","estimate","risk","recommendation","feedback"]},"dogfooding":{"claims":5,"max_evidence":"tested","status":"strong","types":["constraint","factual","risk"],"claim_ids":["d001","p005","e005","x001","w005"],"constraint_count":1,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":3,"missing_types":["estimate","recommendation","feedback"]},"output-format":{"claims":9,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","risk"],"claim_ids":["d002","r007","f002","r010","p008","e003","x003","p011","w008"],"constraint_count":2,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":4,"missing_types":["estimate","recommendation"]},"quality":{"claims":6,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","risk"],"claim_ids":["d005","f004","r009","r011","e006","f007"],"constraint_count":3,"source_origins":["evaluation","research","stakeholder"],"source_count":3,"type_diversity":4,"missing_types":["estimate","recommendation"]},"scope":{"claims":1,"max_evidence":"stated","status":"weak","types":["constraint"],"claim_ids":["d004"],"constraint_count":1,"source_origins":["stakeholder"],"source_count":1,"type_diversity":1,"missing_types":["factual","estimate","risk","recommendation","feedback"]},"ux-pattern":{"claims":13,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","recommendation","risk"],"claim_ids":["r004","r005","r006","p003","f005","p006","p007","f006","x002","x005","w003","w006","w007"],"constraint_count":2,"source_origins":["prototype","research","stakeholder","witness"],"source_count":4,"type_diversity":5,"missing_types":["estimate"]}},"stats":{"total":66,"active":64,"conflicted":0,"superseded":2,"topics":8,"phase":"evaluate","status":"ready"},"conflicts":{"resolved":1,"unresolved":0},"delta":{"added":["w010"],"removed":[],"upgraded":[],"statusChanges":[],"newTopics":[]},"milestone":null},{"index":30,"commit":{"hash":"b659640","message":"wheat: batch — w011, x006-x008, r023-r027, p011 — 66→75 claims","date":"2026-03-11T04:31:31-05:00"},"claims":[{"id":"d001","type":"constraint","topic":"dogfooding","content":"The visualization must be built through the Wheat pipeline itself — claims, compiler, then artifact. It should demonstrate the system by being a product of it.","evidence":"stated","status":"active"},{"id":"d002","type":"constraint","topic":"output-format","content":"Output must be self-contained HTML (inline CSS/JS, no external dependencies) that can be opened directly in a browser.","evidence":"stated","status":"active"},{"id":"d003","type":"constraint","topic":"audience","content":"Target audience is a single developer seeing Wheat for the first time. The visualization should be self-explanatory without external docs.","evidence":"stated","status":"active"},{"id":"d004","type":"constraint","topic":"scope","content":"Full creative freedom — no budget, timeline, or tech constraints beyond self-contained HTML. Go as ambitious as needed.","evidence":"stated","status":"active"},{"id":"d005","type":"constraint","topic":"quality","content":"Success criteria is subjective — 'I'll know it when I see it.' The artifact must be visually compelling enough to sell itself on first impression.","evidence":"stated","status":"active"},{"id":"r002","type":"factual","topic":"architecture","content":"Node.js fs.watch uses OS-level file notifications (FSEvents on macOS, inotify on Linux). For watching a single file like claims.json, it is sufficient without chokidar. Zero dependencies needed.","evidence":"web","status":"active"},{"id":"r003","type":"factual","topic":"architecture","content":"Browser-only approaches (File System Access API) are not viable: Chrome-only, require manual file picker every session, and still need a server to trigger CLI commands. A server is unavoidable.","evidence":"web","status":"active"},{"id":"r004","type":"recommendation","topic":"ux-pattern","content":"Use AST Explorer's pattern: input on left (claims flowing in), compiled output on right (compilation result), updating in real time as data changes. This is the closest proven analogue to showing claims.json -> compiler -> compilation.json.","evidence":"web","status":"active"},{"id":"r005","type":"recommendation","topic":"ux-pattern","content":"For the compiler passes, use a linear pipeline stepper (like GitHub Actions) — stages shown left-to-right with status icons (pending/running/done/error). Color coding: green=pass, yellow=running, red=fail, grey=pending.","evidence":"web","status":"active"},{"id":"r006","type":"recommendation","topic":"ux-pattern","content":"Next.js HMR pattern: server sends lightweight notification with just a hash, browser fetches full data only when needed. For Wheat: SSE sends {event:'update', hash:'abc'}, client fetches /compilation.json. Avoids sending large payloads over SSE.","evidence":"web","status":"active"},{"id":"r007","type":"risk","topic":"output-format","content":"A live-updating UI requires a running server, which conflicts with the 'self-contained HTML' constraint (d002). Resolution: the server is the dev experience; the HTML it serves is still self-contained. Two artifacts: wheat-server.js (dev tool) + output HTML (portable artifact).","evidence":"web","status":"active"},{"id":"p001","type":"factual","topic":"architecture","content":"Working prototype: wheat-server.js is 133 lines (not ~80 as estimated). Still zero npm dependencies. Includes: HTTP server, SSE endpoint, fs.watch on claims.json, auto-compile, static file serving, git log endpoint.","evidence":"tested","status":"active"},{"id":"p002","type":"factual","topic":"architecture","content":"SSE auto-reconnect confirmed working: EventSource reconnects automatically when server restarts, no client-side retry logic needed. Browser handles it natively.","evidence":"tested","status":"active"},{"id":"p003","type":"factual","topic":"ux-pattern","content":"Split-pane layout works: left panel shows claims grouped by phase with type/evidence badges, right panel shows compiled output (coverage bars, conflicts, warnings, git log, certificate). Compiler stepper animates across the top on each update.","evidence":"tested","status":"active"},{"id":"p004","type":"factual","topic":"architecture","content":"fs.watch fires reliably on macOS for claims.json edits. 150ms debounce is sufficient to avoid double-fires. Compiler runs in ~50ms for 13 claims — instant feedback loop.","evidence":"tested","status":"active"},{"id":"p005","type":"factual","topic":"dogfooding","content":"The live dashboard successfully visualizes its own sprint. As prototype claims were added to claims.json, the dashboard updated in real time showing the new claims, updated coverage bars, and re-animated compiler stepper. Self-referential loop confirmed working.","evidence":"tested","status":"active"},{"id":"f001","type":"feedback","topic":"architecture","content":"User prefers the static file:// dashboard (output/dashboard.html) over the live SSE server (localhost:3141). The SSE server doesn't add enough value — most interaction is reading the current state, which the static HTML already shows well. The live server is over-engineered for the actual use pattern.","evidence":"stated","status":"active"},{"id":"f002","type":"feedback","topic":"output-format","content":"The self-contained HTML approach (file:// openable, no server needed) is actually the right call for this use case. The /status command already regenerates the dashboard on demand — that's sufficient. Real-time SSE updates are cool but unnecessary.","evidence":"stated","status":"active"},{"id":"f003","type":"feedback","topic":"architecture","content":"The live SSE server IS valuable as a dev-time tool — watching claims update in real time during a sprint is useful. The earlier preference for static (f001) was about the final artifact, not the dev experience. Both have a role: live server for working, static HTML for sharing.","evidence":"stated","status":"active"},{"id":"f004","type":"feedback","topic":"quality","content":"The live dashboard UI (localhost:3141) is too rudimentary — functional but not sleek. Needs a UX polish pass: the layout, typography, and visual hierarchy should feel as polished as the static /status dashboard, not like a debug tool.","evidence":"stated","status":"active"},{"id":"f005","type":"feedback","topic":"ux-pattern","content":"The dashboard needs a timeline-based UI — a visual narrative of the sprint's progression over time, not just a static grid of current state. Data-rich dashboards can be built without overwhelming the user by using progressive disclosure, timeline views, and visual hierarchy. The current layout dumps everything at once instead of telling a story.","evidence":"stated","status":"active"},{"id":"p006","type":"factual","topic":"ux-pattern","content":"Timeline-first dashboard prototype built: vertical timeline as primary UI spine, claims as expandable nodes grouped by phase (define/research/prototype/evaluate/feedback), progressive disclosure via click-to-expand detail panels. Compact scoreboard replaces the old card grid. Coverage shown as inline topic chips with evidence-tier colored dots. Conflict resolutions and warnings appear as inline timeline events. 'Now' node pulses at the bottom showing live watching state.","evidence":"tested","status":"active"},{"id":"p007","type":"factual","topic":"ux-pattern","content":"Phase-colored visual system confirmed effective: each sprint phase gets a distinct color (define=amber, research=blue, prototype=green, evaluate=purple, feedback=cyan) applied consistently to timeline dots, claim IDs, phase headers, and claim dot accents. Creates instant visual grouping without labels.","evidence":"tested","status":"active"},{"id":"f006","type":"constraint","topic":"ux-pattern","content":"New information (latest claims, events, compilations) should populate from the top of the timeline, not the bottom. Reverse chronological order — newest first, like a social feed or activity log. The user shouldn't have to scroll to see what just changed.","evidence":"stated","status":"active"},{"id":"r009","type":"factual","topic":"quality","content":"3 of 4 'weak evidence' compiler warnings are false alarms. Topics audience, scope, and quality consist entirely of constraint/feedback claims whose natural evidence tier is 'stated'. Constraints are stakeholder decisions, not testable hypotheses — 'stated' is their correct and final tier. The compiler's evidence tier system was designed for testable claims, not definitional boundaries.","evidence":"web","status":"active"},{"id":"r010","type":"factual","topic":"output-format","content":"The output-format topic is the only real evidence gap among the 4 warnings. It has a risk claim (r007) at web tier about server-vs-static tension. This is upgradeable to 'tested' by verifying that output/dashboard.html works as self-contained HTML: opens via file://, zero external network requests, all CSS/JS inline, works offline.","evidence":"web","status":"active"},{"id":"r011","type":"risk","topic":"quality","content":"The compiler's W_WEAK_EVIDENCE warning system has a semantic blind spot: it treats all claim types equally, but constraint claims (type: constraint, feedback) are inherently 'stated' tier and cannot be upgraded. This creates persistent false-positive warnings on constraint-heavy topics, reducing signal-to-noise ratio for future sprints.","evidence":"web","status":"active"},{"id":"r012","type":"recommendation","topic":"architecture","content":"The compiler should add constraint-aware coverage analysis: topics where >50% of claims are type 'constraint' or 'feedback' should not emit W_WEAK_EVIDENCE. Instead, emit W_CONSTRAINT_ONLY as an informational note. This preserves the warning for genuinely under-researched topics while silencing noise on definitional ones.","evidence":"web","status":"active"},{"id":"p008","type":"factual","topic":"output-format","content":"All 4 static HTML artifacts (output/dashboard.html, output/problem-statement.html, research/live-ui-architecture.html, research/evidence-gap-analysis.html) verified fully self-contained: zero external URLs, zero <script src=>, zero <link href=>, zero <img src=> pointing to external resources. All CSS and JS are inline. Every file opens correctly via file:// protocol with no network requests. The self-contained HTML constraint (d002) is confirmed satisfied.","evidence":"tested","status":"active"},{"id":"r013","type":"factual","topic":"architecture","content":"Wheat command suite expanded from 10 to 17 commands organized in 3 tiers: Tier 1 (Sprint Lifecycle) has 10 original commands for the define→research→prototype→evaluate→ship pipeline. Tier 2 (Quality Assurance) adds 4 new commands (/challenge, /blind-spot, /witness, /calibrate) for adversarial testing and corroboration. Tier 3 (Operations) adds 3 new commands (/replay, /handoff, /merge) for multi-sprint and multi-person workflows.","evidence":"documented","status":"active"},{"id":"r014","type":"factual","topic":"architecture","content":"Compiler grew from ~430 lines (v0.1.0) to 685 lines (v0.2.0) with 9 new capabilities: --input/--output flags, --diff mode, source diversity tracking, type diversity tracking, corroboration system, constraint-aware coverage (W_CONSTRAINT_ONLY), wheat.config.json support, burn-residue safety check, and module exports for library usage. Still zero npm dependencies.","evidence":"documented","status":"active"},{"id":"r015","type":"factual","topic":"architecture","content":"Claim ID namespace expanded from 5 to 9 prefixes: original d### (define), r### (research), p### (prototype), e### (evaluate), f### (feedback); new x### (challenge), w### (witness), cal### (calibrate); plus burn- synthetic prefix rejected by compiler safety check.","evidence":"documented","status":"active"},{"id":"r016","type":"recommendation","topic":"architecture","content":"The Tier 2 QA commands create three feedback loops: (1) self-correction (/challenge → conflict → /resolve), (2) external validation (/witness → corroboration count), (3) meta-learning (/calibrate → scores predictions against production → validates whether evidence tiers predict accuracy). The /calibrate loop is unique — it's the only command that tests whether Wheat itself works.","evidence":"documented","status":"active"},{"id":"r017","type":"factual","topic":"accessibility","content":"The dashboard's --text-dim color (#505a6e on #0a0e1a) has a contrast ratio of 2.78:1, failing WCAG 2.2 AA minimum of 4.5:1 for normal text and 3:1 for UI components. This color is used for metadata labels, tags, phase subtitles, and the 'Now' timestamp — all informational text that becomes unreadable for users with low vision or contrast sensitivity.","evidence":"web","status":"active"},{"id":"r018","type":"risk","topic":"accessibility","content":"The dashboard has zero ARIA landmarks or semantic HTML. All structure uses <div> elements — no <main>, <header>, <nav>, no role attributes. Screen reader users cannot navigate by region, skip to main content, or understand the page structure. This violates WCAG 2.2 SC 1.3.1 (Info and Relationships) and makes the dashboard effectively unusable with assistive technology.","evidence":"web","status":"active"},{"id":"r019","type":"risk","topic":"accessibility","content":"Claim rows use onclick handlers on <div> elements with no keyboard support. No tabindex, no role='button', no Enter/Space key handlers. Keyboard-only users cannot expand claim details. This violates WCAG 2.2 SC 2.1.1 (Keyboard) — all functionality must be operable via keyboard.","evidence":"web","status":"active"},{"id":"r020","type":"risk","topic":"accessibility","content":"SSE-driven DOM updates happen silently — no aria-live regions announce changes to screen readers. When new claims arrive or the compiler status changes, sighted users see animations but screen reader users get zero notification. Adding aria-live='polite' to the scoreboard and timeline would fix this without disrupting the visual experience.","evidence":"web","status":"active"},{"id":"r021","type":"recommendation","topic":"accessibility","content":"Five targeted fixes would bring the dashboard to WCAG 2.2 AA: (1) Raise --text-dim from #505a6e to #7a839a (4.5:1 ratio). (2) Add semantic landmarks: <header> for topbar, <main> for layout, role='status' on scoreboard. (3) Add tabindex='0', role='button', aria-expanded, and keydown handler for Enter/Space on claim rows. (4) Add aria-live='polite' to scoreboard and timeline container. (5) Add :focus-visible outline styles to all interactive elements.","evidence":"web","status":"active"},{"id":"r022","type":"risk","topic":"accessibility","content":"The explainer template (templates/explainer.html) imports Google Fonts via @import url('https://fonts.googleapis.com/...'), which is both an external dependency (tension with d002 self-contained constraint) and an accessibility concern: if the CDN is unreachable, text may render in a fallback font with different metrics, potentially breaking layout. The template should use the system font stack already defined as fallback.","evidence":"web","status":"active"},{"id":"p009","type":"factual","topic":"accessibility","content":"All 5 WCAG 2.2 AA fixes implemented on the live dashboard in ~25 lines of changes: (1) --text-dim raised from #505a6e to #7a839a — now 5.08:1 on --bg, 4.68:1 on --surface (both pass AA). (2) Semantic landmarks added: <header> for topbar, <main> for layout, role='status' on scoreboard, role='region' on timeline. (3) Keyboard support: claim rows have tabindex='0', role='button', aria-expanded, Enter/Space keydown handler. (4) aria-live='polite' on scoreboard and timeline — screen readers announce SSE updates. (5) :focus-visible outlines on all interactive elements. Zero visual regression — design unchanged for sighted users.","evidence":"tested","status":"active"},{"id":"e001","type":"factual","topic":"architecture","content":"Compiler scales linearly: 42 claims in 45ms, 100 in 44ms, 250 in 65ms, 500 in 50ms, 1000 in 59ms. Sub-60ms at 1000 claims means the feedback loop stays instant even for large sprints. The 7-pass pipeline has no exponential blowup — conflict detection is the only O(n^2) pass but stays fast due to sparse conflict graphs.","evidence":"tested","status":"active"},{"id":"e002","type":"risk","topic":"architecture","content":"Compiler crashes on empty or unparseable claims.json files (throws unhandled JSON parse error). Gracefully handles structural issues: missing claims array defaults to empty, missing meta defaults to empty, invalid claim fields produce BLOCKED status with errors. Two crash cases (empty file, malformed JSON) should be caught with a try/catch at the top level.","evidence":"tested","status":"active"},{"id":"e003","type":"factual","topic":"output-format","content":"All 7 HTML artifacts verified fully self-contained: zero external script src, link href, @import url, or img src pointing to external resources. Sizes range from 7.3KB (problem-statement) to 26.3KB (live dashboard). Every file opens correctly via file:// with no network requests. Constraint d002 is satisfied across the entire artifact set.","evidence":"tested","status":"active"},{"id":"e004","type":"factual","topic":"accessibility","content":"13/13 WCAG 2.2 AA checks pass on the live dashboard: lang attribute, <header> landmark, <main> landmark, role=status, role=region, aria-live=polite, aria-expanded, tabindex=0, role=button, onkeydown handler, :focus-visible styles, aria-label attributes, and contrast ratio >= 4.5:1. The accessibility research claims (r017-r022) are confirmed implemented and working.","evidence":"tested","status":"active"},{"id":"e005","type":"factual","topic":"dogfooding","content":"The sprint successfully dogfoods itself: 20/42 claims are self-referential (reference the dashboard, Wheat, or the sprint itself). 16 wheat-format git commits trace the full event log. 4 of 5 phases exercised (define, research, prototype, feedback — evaluate now being added). 8 topics covered, 8 artifacts generated, 1 conflict auto-resolved. The visualization demonstrates the framework by being a product of it — constraint d001 is satisfied.","evidence":"tested","status":"active"},{"id":"e006","type":"factual","topic":"quality","content":"Evidence distribution across 40 active claims: stated=11 (27.5%), web=17 (42.5%), documented=4 (10%), tested=9 (22.5%), production=0. The tested tier is the highest reached. 5 of 8 topics have tested-level evidence. The constraint-dominated topics (audience, scope) correctly remain at stated. The quality topic remains at web — the only genuine evidence gap.","evidence":"tested","status":"active"},{"id":"f007","type":"feedback","topic":"quality","content":"Stakeholder loves the Samurai Jack-themed presentation, specifically the 'Compiled by Wheat — gotta get back, back to the past' tagline. The thematic approach (kanji watermarks, brush-stroke dividers, woodblock panel aesthetic) resonates — personality in output artifacts makes the framework more memorable and shareable. This validates the 'I'll know it when I see it' quality bar (d005).","evidence":"stated","status":"active"},{"id":"x001","type":"risk","topic":"dogfooding","content":"The self-referential dogfooding creates a circular dependency: the dashboard's value proposition depends on the sprint being interesting, but the sprint's interest depends on the dashboard working. If a future sprint has a boring question or few claims, the dashboard looks empty and the teaching effect collapses. Dogfooding only works when there's enough data to visualize.","evidence":"web","status":"active"},{"id":"x002","type":"risk","topic":"ux-pattern","content":"The timeline-first UI assumes claims arrive chronologically with clear phase boundaries. In practice, sprints are messy: researchers revisit define-phase assumptions, prototypes generate new research questions, feedback arrives mid-prototype. The clean phase→phase timeline may misrepresent the actual nonlinear workflow, giving new users a false impression of Wheat's linearity.","evidence":"web","status":"active"},{"id":"w001","type":"factual","topic":"architecture","content":"External corroboration for p001: SSE with zero-dependency Node.js is the established pattern for real-time dashboards. DigitalOcean, dev.to, and multiple 2024-2025 tutorials confirm native http + EventSource as the standard approach — no Express or socket.io needed. The 133-line server size is consistent with community examples (80-150 lines typical).","evidence":"web","status":"active"},{"id":"p010","type":"factual","topic":"accessibility","content":"Google Fonts @import removed from both templates (explainer.html, dashboard.html). Replaced with system font stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif. Zero external requests. Resolves r022 risk and strengthens d002 self-contained constraint. All generated HTML artifacts were already clean — only the source templates had the import.","evidence":"tested","status":"active"},{"id":"x003","type":"risk","topic":"output-format","content":"The '7/7 self-contained' verification (e003) is a point-in-time snapshot — every new HTML artifact generated by future slash commands could reintroduce external dependencies if templates aren't checked. The explainer template had Google Fonts until p010 fixed it. There is no automated guard: no pre-commit hook or compiler pass that scans output HTML for external URLs. Self-containment could silently regress.","evidence":"web","status":"active"},{"id":"w002","type":"factual","topic":"architecture","content":"External corroboration for p002: MDN and the WHATWG HTML Living Standard confirm EventSource auto-reconnects natively with ~3s default retry. The server can tune retry via the retry: field, and the browser sends Last-Event-ID on reconnect for resumption. One caveat: auto-reconnect only fires on network failure, not on HTTP error responses (e.g. 500).","evidence":"web","status":"active"},{"id":"x004","type":"risk","topic":"architecture","content":"The scalability benchmark (e001: 59ms at 1000 claims) measures compilation time only — it ignores the full loop cost: file I/O to read claims.json (grows linearly with file size), JSON.parse (superlinear for large strings), writing compilation.json, and the browser re-rendering the dashboard DOM. At 1000 claims the JSON file would be ~500KB and the dashboard would have 1000+ DOM nodes. The bottleneck shifts from compiler to I/O and rendering well before 1000 claims.","evidence":"web","status":"active"},{"id":"x005","type":"risk","topic":"ux-pattern","content":"The timeline-first UI (p006) assumes a single-user, single-session workflow. If multiple contributors run /research or /prototype concurrently (e.g. pair programming or async collaboration), the timeline will interleave claims from different people with no attribution. There's no claim-level author tracking — the timeline shows what happened but not who did it, making collaborative sprints opaque.","evidence":"web","status":"active"},{"id":"p011","type":"factual","topic":"output-format","content":"Automated self-containment guard implemented: `node wheat-compiler.js --scan` checks all HTML files across output/, research/, evidence/, and prototypes/ for external URLs in script src, link href, @import url, and img src. Scans 10 HTML files, reports clean/dirty with specific URLs. Exits 1 on violation. Directly resolves x003 regression risk.","evidence":"tested","status":"active"},{"id":"w003","type":"factual","topic":"ux-pattern","content":"External corroboration for p003: AST Explorer (astexplorer.net) is the canonical example of the split-pane input→output pattern for code visualization. Left pane for source input, right pane for parsed output, real-time updates as you type. The pattern is widely adopted: TypeScript AST Viewer, SQL Parser, Scalameta all use the same layout. Wheat's claims→compilation split-pane follows this established convention.","evidence":"web","status":"active"},{"id":"w004","type":"factual","topic":"architecture","content":"External corroboration for p004: Node.js GitHub issue #47058 documents benchmarks showing fs.watch is reliable for single-file watching on macOS. Community consensus is that chokidar is only needed for recursive directory watching or cross-platform edge cases — for a single file like claims.json, native fs.watch with debounce is the recommended zero-dependency approach.","evidence":"web","status":"active"},{"id":"w005","type":"factual","topic":"dogfooding","content":"External corroboration for p005: The self-referential dogfooding pattern is well-established. Keen IO built 'analytics for your analytics' — their Native Analytics dashboard displayed by their own analytics platform. GitLab dogfoods their Insights visualization tool internally. Bubble builds their entire website on their own platform. Wheat's 'dashboard that displays claims about itself' follows this proven pattern of tools demonstrating their own capabilities.","evidence":"web","status":"active"},{"id":"w006","type":"factual","topic":"ux-pattern","content":"External corroboration for p006: Timeline-first layouts with progressive disclosure are an established UX pattern. Interaction Design Foundation, LogRocket, and Material UI all document vertical timelines with expandable nodes grouped by phase/stage as a standard approach for activity feeds and chronological dashboards. Accordions and click-to-expand are the canonical progressive disclosure mechanism for managing information density.","evidence":"web","status":"active"},{"id":"w007","type":"factual","topic":"ux-pattern","content":"External corroboration for p007: Atlassian, Sigma Computing, and Datawrapper all document categorical color coding as the standard data visualization practice. Best practice is 5-7 distinct hues for categorical grouping — Wheat's 5-phase color system (amber, blue, green, purple, cyan) falls exactly in this range. Consistent color-to-category mapping across a dashboard is explicitly recommended for visual grouping without labels.","evidence":"web","status":"active"},{"id":"w008","type":"factual","topic":"output-format","content":"External corroboration for p008: Self-contained single-file HTML is an established distribution pattern. Multiple tools exist specifically for this (vite-plugin-singlefile, Inliner.js, HtmlPackager, webpage2html). Use cases include reports, presentations, and offline-first apps — exactly Wheat's use case. The approach of inlining all CSS/JS with zero external dependencies is the standard solution for portable, shareable HTML artifacts.","evidence":"web","status":"active"},{"id":"w009","type":"factual","topic":"accessibility","content":"External corroboration for p009: WebAIM's WCAG 2 Checklist confirms the 5-fix approach (contrast, landmarks, keyboard, aria-live, focus styles) as the standard WCAG 2.2 AA remediation pattern. These are consistently listed as the top quick-wins for dashboard accessibility. The approach of fixing contrast ratios, adding semantic HTML, enabling keyboard nav, announcing dynamic updates, and styling focus indicators is the universally recommended minimum for AA compliance.","evidence":"web","status":"active"},{"id":"w010","type":"factual","topic":"architecture","content":"External corroboration for e001: Benchmarks from esbuild/SWC/Babel comparisons confirm that lightweight Node.js build pipelines processing structured data (JSON, AST) achieve sub-100ms times for thousands of items. The wheat compiler's 59ms at 1000 claims is consistent with expected performance for a 7-pass pipeline over in-memory JSON — no exotic optimization needed, just linear traversal.","evidence":"web","status":"active"},{"id":"w011","type":"factual","topic":"architecture","content":"External corroboration for e002: Wrapping JSON.parse in try-catch is universally documented as the standard Node.js best practice for handling malformed input. GeeksforGeeks, Medium, OpenReplay, and Sentry all recommend this exact pattern. The wheat compiler's fix (try-catch around JSON.parse with clean error message) follows the canonical approach.","evidence":"web","status":"active"},{"id":"x006","type":"risk","topic":"architecture","content":"The compiler's 7-pass pipeline (validate→types→sort→conflicts→resolve→coverage→readiness) runs all passes sequentially even when earlier passes fail. Validation errors in pass 1 skip later passes via conditional, but there's no early-exit for warnings — a claim set with 50 warnings still runs the full pipeline. At scale this is fine (sub-60ms), but architecturally it's a latent coupling that could bite if passes become expensive.","evidence":"web","status":"active"},{"id":"x007","type":"risk","topic":"quality","content":"The 'I'll know it when I see it' success criterion (d005) is unfalsifiable — any outcome can be retroactively declared a success or failure. This means the quality topic can never reach 'tested' evidence tier through objective means. The Samurai Jack feedback (f007) validates subjective quality but sets a dangerous precedent: novelty (themed presentations) substitutes for rigor.","evidence":"web","status":"active"},{"id":"x008","type":"risk","topic":"accessibility","content":"WCAG 2.2 AA compliance was verified manually against 13 checks (e004), but there's no automated accessibility testing in the pipeline. Tools like axe-core, Pa11y, or Lighthouse can catch regressions automatically. Without CI-integrated a11y testing, the WCAG fixes (p009) could regress silently — same problem as x003 but for accessibility instead of self-containment.","evidence":"web","status":"active"},{"id":"r023","type":"factual","topic":"architecture","content":"The --next flag's priority system (P0-P5) is a static heuristic — it doesn't learn from user behavior. If a user consistently ignores P4-CORROBORATION suggestions, --next keeps recommending them. A smarter system would track which actions users actually execute and weight recommendations accordingly. The current implementation is a good v1 but lacks adaptive feedback.","evidence":"web","status":"active"},{"id":"r024","type":"recommendation","topic":"architecture","content":"The compiler should support a --watch mode that combines fs.watch + auto-compile + --next into a single long-running process. Currently the dev loop is: edit claims.json → manually run compiler → read output. A --watch mode would auto-compile on save and print the next suggested action, creating a tighter feedback loop than the current manual workflow.","evidence":"web","status":"active"},{"id":"r025","type":"factual","topic":"dogfooding","content":"The sprint's git log is itself a machine-readable event stream: every wheat commit follows the pattern 'wheat: /<command> <summary> — added <IDs>'. This means git log --oneline claims.json can be parsed to reconstruct the sprint timeline, identify command frequency, and measure velocity. The git log IS the sprint's activity log — no separate event store needed.","evidence":"documented","status":"active"},{"id":"r026","type":"estimate","topic":"architecture","content":"At the current claim growth rate (~15 claims per speedrun cycle), a typical sprint would produce 50-100 claims over its lifecycle. The compiler handles 1000 claims in 59ms (e001), so there's ~10-20x headroom before performance becomes noticeable. The real scaling bottleneck is human: reading and understanding 100+ claims requires better filtering/search in the dashboard.","evidence":"web","status":"active"},{"id":"r027","type":"recommendation","topic":"ux-pattern","content":"The dashboard should support claim filtering by topic, type, evidence tier, and phase. At 50+ claims, scrolling the full timeline becomes unwieldy. A filter bar at the top (topic chips, type dropdown, evidence tier slider) would enable focused exploration without losing the timeline context. This is standard dashboard UX — every analytics tool has faceted filtering.","evidence":"web","status":"active"}],"coverage":{"accessibility":{"claims":11,"max_evidence":"tested","status":"strong","types":["factual","recommendation","risk"],"claim_ids":["r017","r018","r019","r020","r021","r022","p009","e004","p010","w009","x008"],"constraint_count":0,"source_origins":["evaluation","prototype","research","witness"],"source_count":4,"type_diversity":3,"missing_types":["constraint","estimate","feedback"]},"architecture":{"claims":24,"max_evidence":"tested","status":"strong","types":["estimate","factual","feedback","recommendation","risk"],"claim_ids":["r002","r003","p001","p002","p004","f001","f003","r012","r013","r014","r015","r016","e001","e002","w001","w002","x004","w004","w010","w011","x006","r023","r024","r026"],"constraint_count":2,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":5,"missing_types":["constraint"]},"audience":{"claims":1,"max_evidence":"stated","status":"weak","types":["constraint"],"claim_ids":["d003"],"constraint_count":1,"source_origins":["stakeholder"],"source_count":1,"type_diversity":1,"missing_types":["factual","estimate","risk","recommendation","feedback"]},"dogfooding":{"claims":6,"max_evidence":"tested","status":"strong","types":["constraint","factual","risk"],"claim_ids":["d001","p005","e005","x001","w005","r025"],"constraint_count":1,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":3,"missing_types":["estimate","recommendation","feedback"]},"output-format":{"claims":9,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","risk"],"claim_ids":["d002","r007","f002","r010","p008","e003","x003","p011","w008"],"constraint_count":2,"source_origins":["evaluation","prototype","research","stakeholder","witness"],"source_count":5,"type_diversity":4,"missing_types":["estimate","recommendation"]},"quality":{"claims":7,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","risk"],"claim_ids":["d005","f004","r009","r011","e006","f007","x007"],"constraint_count":3,"source_origins":["evaluation","research","stakeholder"],"source_count":3,"type_diversity":4,"missing_types":["estimate","recommendation"]},"scope":{"claims":1,"max_evidence":"stated","status":"weak","types":["constraint"],"claim_ids":["d004"],"constraint_count":1,"source_origins":["stakeholder"],"source_count":1,"type_diversity":1,"missing_types":["factual","estimate","risk","recommendation","feedback"]},"ux-pattern":{"claims":14,"max_evidence":"tested","status":"strong","types":["constraint","factual","feedback","recommendation","risk"],"claim_ids":["r004","r005","r006","p003","f005","p006","p007","f006","x002","x005","w003","w006","w007","r027"],"constraint_count":2,"source_origins":["prototype","research","stakeholder","witness"],"source_count":4,"type_diversity":5,"missing_types":["estimate"]}},"stats":{"total":75,"active":73,"conflicted":0,"superseded":2,"topics":8,"phase":"evaluate","status":"ready"},"conflicts":{"resolved":1,"unresolved":0},"delta":{"added":["w011","x006","x007","x008","r023","r024","r025","r026","r027"],"removed":[],"upgraded":[],"statusChanges":[],"newTopics":[]},"milestone":"+9 claims added"},{"index":31,"commit":{"hash":"a9920d1","message":"wheat: batch — w012, r028-r035, x006-x010 — 75→86 claims","date":"2026-03-11T04:33:35-05:00"},"claims":[{"id":"d001","type":"constraint","topic":"dogfooding","content":"The visualization must be built through the Wheat pipeline itself — claims, compiler, then artifact. It should demonstrate the system by being a product of it.","evidence":"stated","status":"active"},{"id":"d002","type":"constraint","topic":"output-format","content":"Output must be self-contained HTML (inline CSS/JS, no external dependencies) that can be opened directly in a browser.","evidence":"stated","status":"active"},{"id":"d003","type":"constraint","topic":"audience","content":"Target audience is a single developer seeing Wheat for the first time. The visualization should be self-explanatory without external docs.","evidence":"stated","status":"active"},{"id":"d004","type":"constraint","topic":"scope","content":"Full creative freedom — no budget, timeline, or tech constraints beyond self-contained HTML. Go as ambitious as needed.","evidence":"stated","status":"active"},{"id":"d005","type":"constraint","topic":"quality","content":"Success criteria is subjective — 'I'll know it when I see it.' The artifact must be visually compelling enough to sell itself on first impression.","evidence":"stated","status":"active"},{"id":"r002","type":"factual","topic":"architecture","content":"Node.js fs.watch uses OS-level file notifications (FSEvents on macOS, inotify on Linux). For watching a single file like claims.json, it is sufficient without chokidar. Zero dependencies needed.","evidence":"web","status":"active"},{"id":"r003","type":"factual","topic":"architecture","content":"Browser-only approaches (File System Access API) are not viable: Chrome-only, require manual file picker every session, and still need a server to trigger CLI commands. A server is unavoidable.","evidence":"web","status":"active"},{"id":"r004","type":"recommendation","topic":"ux-pattern","content":"Use AST Explorer's pattern: input on left (claims flowing in), compiled output on right (compilation result), updating in real time as data changes. This is the closest proven analogue to showing claims.json -> compiler -> compilation.json.","evidence":"web","status":"active"},{"id":"r005","type":"recommendation","topic":"ux-pattern","content":"For the compiler passes, use a linear pipeline stepper (like GitHub Actions) — stages shown left-to-right with status icons (pending/running/done/error). Color coding: green=pass, yellow=running, red=fail, grey=pending.","evidence":"web","status":"active"},{"id":"r006","type":"recommendation","topic":"ux-pattern","content":"Next.js HMR pattern: server sends lightweight notification with just a hash, browser fetches full data only when needed. For Wheat: SSE sends {event:'update', hash:'abc'}, client fetches /compilation.json. Avoids sending large payloads over SSE.","evidence":"web","status":"active"},{"id":"r007","type":"risk","topic":"output-format","content":"A live-updating UI requires a running server, which conflicts with the 'self-contained HTML' constraint (d002). Resolution: the server is the dev experience; the HTML it serves is still self-contained. Two artifacts: wheat-server.js (dev tool) + output HTML (portable artifact).","evidence":"web","status":"active"},{"id":"p001","type":"factual","topic":"architecture","content":"Working prototype: wheat-server.js is 133 lines (not ~80 as estimated). Still zero npm dependencies. Includes: HTTP server, SSE endpoint, fs.watch on claims.json, auto-compile, static file serving, git log endpoint.","evidence":"tested","status":"active"},{"id":"p002","type":"factual","topic":"architecture","content":"SSE auto-reconnect confirmed working: EventSource reconnects automatically when server restarts, no client-side retry logic needed. Browser handles it natively.","evidence":"tested","status":"active"},{"id":"p003","type":"factual","topic":"ux-pattern","content":"Split-pane layout works: left panel shows claims grouped by phase with type/evidence badges, right panel shows compiled output (coverage bars, conflicts, warnings, git log, certificate). Compiler stepper animates across the top on each update.","evidence":"tested","status":"active"},{"id":"p004","type":"factual","topic":"architecture","content":"fs.watch fires reliably on macOS for claims.json edits. 150ms debounce is sufficient to avoid double-fires. Compiler runs in ~50ms for 13 claims — instant feedback loop.","evidence":"tested","status":"active"},{"id":"p005","type":"factual","topic":"dogfooding","content":"The live dashboard successfully visualizes its own sprint. As prototype claims were added to claims.json, the dashboard updated in real time showing the new claims, updated coverage bars, and re-animated compiler stepper. Self-referential loop confirmed working.","evidence":"tested","status":"active"},{"id":"f001","type":"feedback","topic":"architecture","content":"User prefers the static file:// dashboard (output/dashboard.html) over the live SSE server (localhost:3141). The SSE server doesn't add enough value — most interaction is reading the current state, which the static HTML already shows well. The live server is over-engineered for the actual use pattern.","evidence":"stated","status":"active"},{"id":"f002","type":"feedback","topic":"output-format","content":"The self-contained HTML approach (file:// openable, no server needed) is actually the right call for this use case. The /status command already regenerates the dashboard on demand — that's sufficient. Real-time SSE updates are cool but unnecessary.","evidence":"stated","status":"active"},{"id":"f003","type":"feedback","topic":"architecture","content":"The live SSE server IS valuable as a dev-time tool — watching claims update in real time during a sprint is useful. The earlier preference for static (f001) was about the final artifact, not the dev experience. Both have a role: live server for working, static HTML for sharing.","evidence":"stated","status":"active"},{"id":"f004","type":"feedback","topic":"quality","content":"The live dashboard UI (localhost:3141) is too rudimentary — functional but not sleek. Needs a UX polish pass: the layout, typography, and visual hierarchy should feel as polished as the static /status dashboard, not like a debug tool.","evidence":"stated","status":"active"},{"id":"f005","type":"feedback","topic":"ux-pattern","content":"The dashboard needs a timeline-based UI — a visual narrative of the sprint's progression over time, not just a static grid of current state. Data-rich dashboards can be built without overwhelming the user by using progressive disclosure, timeline views, and visual hierarchy. The current layout dumps everything at once instead of telling a story.","evidence":"stated","status":"active"},{"id":"p006","type":"factual","topic":"ux-pattern","content":"Timeline-first dashboard prototype built: vertical timeline as primary UI spine, claims as expandable nodes grouped by phase (define/research/prototype/evaluate/feedback), progressive disclosure via click-to-expand detail panels. Compact scoreboard replaces the old card grid. Coverage shown as inline topic chips with evidence-tier colored dots. Conflict resolutions and warnings appear as inline timeline events. 'Now' node pulses at the bottom showing live watching state.","evidence":"tested","status":"active"},{"id":"p007","type":"factual","topic":"ux-pattern","content":"Phase-colored visual system confirmed effective: each sprint phase gets a distinct color (define=amber, research=blue, prototype=green, evaluate=purple, feedback=cyan) applied consistently to timeline dots, claim IDs, phase headers, and claim dot accents. Creates instant visual grouping without labels.","evidence":"tested","status":"active"},{"id":"f006","type":"constraint","topic":"ux-pattern","content":"New information (latest claims, events, compilations) should populate from the top of the timeline, not the bottom. Reverse chronological order — newest first, like a social feed or activity log. The user shouldn't have to scroll to see what just changed.","evidence":"stated","status":"active"},{"id":"r009","type":"factual","topic":"quality","content":"3 of 4 'weak evidence' compiler warnings are false alarms. Topics audience, scope, and quality consist entirely of constraint/feedback claims whose natural evidence tier is 'stated'. Constraints are stakeholder decisions, not testable hypotheses — 'stated' is their correct and final tier. The compiler's evidence tier system was designed for testable claims, not definitional boundaries.","evidence":"web","status":"active"},{"id":"r010","type":"factual","topic":"output-format","content":"The output-format topic is the only real evidence gap among the 4 warnings. It has a risk claim (r007) at web tier about server-vs-static tension. This is upgradeable to 'tested' by verifying that output/dashboard.html works as self-contained HTML: opens via file://, zero external network requests, all CSS/JS inline, works offline.","evidence":"web","status":"active"},{"id":"r011","type":"risk","topic":"quality","content":"The compiler's W_WEAK_EVIDENCE warning system has a semantic blind spot: it treats all claim types equally, but constraint claims (type: constraint, feedback) are inherently 'stated' tier and cannot be upgraded. This creates persistent false-positive warnings on constraint-heavy topics, reducing signal-to-noise ratio for future sprints.","evidence":"web","status":"active"},{"id":"r012","type":"recommendation","topic":"architecture","content":"The compiler should add constraint-aware coverage analysis: topics where >50% of claims are type 'constraint' or 'feedback' should not emit W_WEAK_EVIDENCE. Instead, emit W_CONSTRAINT_ONLY as an informational note. This preserves the warning for genuinely under-researched topics while silencing noise on definitional ones.","evidence":"web","status":"active"},{"id":"p008","type":"factual","topic":"output-format","content":"All 4 static HTML artifacts (output/dashboard.html, output/problem-statement.html, research/live-ui-architecture.html, research/evidence-gap-analysis.html) verified fully self-contained: zero external URLs, zero <script src=>, zero <link href=>, zero <img src=> pointing to external resources. All CSS and JS are inline. Every file opens correctly via file:// protocol with no network requests. The self-contained HTML constraint (d002) is confirmed satisfied.","evidence":"tested","status":"active"},{"id":"r013","type":"factual","topic":"architecture","content":"Wheat command suite expanded from 10 to 17 commands organized in 3 tiers: Tier 1 (Sprint Lifecycle) has 10 original commands for the define→research→prototype→evaluate→ship pipeline. Tier 2 (Quality Assurance) adds 4 new commands (/challenge, /blind-spot, /witness, /calibrate) for adversarial testing and corroboration. Tier 3 (Operations) adds 3 new commands (/replay, /handoff, /merge) for multi-sprint and multi-person workflows.","evidence":"documented","status":"active"},{"id":"r014","type":"factual","topic":"architecture","content":"Compiler grew from ~430 lines (v0.1.0) to 685 lines (v0.2.0) with 9 new capabilities: --input/--output flags, --diff mode, source diversity tracking, type diversity tracking, corroboration system, constraint-aware coverage (W_CONSTRAINT_ONLY), wheat.config.json support, burn-residue safety check, and module exports for library usage. Still zero npm dependencies.","evidence":"documented","status":"active"},{"id":"r015","type":"factual","topic":"architecture","content":"Claim ID namespace expanded from 5 to 9 prefixes: original d### (define), r### (research), p### (prototype), e### (evaluate), f### (feedback); new x### (challenge), w### (witness), cal### (calibrate); plus burn- synthetic prefix rejected by compiler safety check.","evidence":"documented","status":"active"},{"id":"r016","type":"recommendation","topic":"architecture","content":"The Tier 2 QA commands create three feedback loops: (1) self-correction (/challenge → conflict → /resolve), (2) external validation (/witness → corroboration count), (3) meta-learning (/calibrate → scores predictions against production → validates whether evidence tiers predict accuracy). The /calibrate loop is unique — it's the only command that tests whether Wheat itself works.","evidence":"documented","status":"active"},{"id":"r017","type":"factual","topic":"accessibility","content":"The dashboard's --text-dim color (#505a6e on #0a0e1a) has a contrast ratio of 2.78:1, failing WCAG 2.2 AA minimum of 4.5:1 for normal text and 3:1 for UI components. This color is used for metadata labels, tags, phase subtitles, and the 'Now' timestamp — all informational text that becomes unreadable for users with low vision or contrast sensitivity.","evidence":"web","status":"active"},{"id":"r018","type":"risk","topic":"accessibility","content":"The dashboard has zero ARIA landmarks or semantic HTML. All structure uses <div> elements — no <main>, <header>, <nav>, no role attributes. Screen reader users cannot navigate by region, skip to main content, or understand the page structure. This violates WCAG 2.2 SC 1.3.1 (Info and Relationships) and makes the dashboard effectively unusable with assistive technology.","evidence":"web","status":"active"},{"id":"r019","type":"risk","topic":"accessibility","content":"Claim rows use onclick handlers on <div> elements with no keyboard support. No tabindex, no role='button', no Enter/Space key handlers. Keyboard-only users cannot expand claim details. This violates WCAG 2.2 SC 2.1.1 (Keyboard) — all functionality must be operable via keyboard.","evidence":"web","status":"active"},{"id":"r020","type":"risk","topic":"accessibility","content":"SSE-driven DOM updates happen silently — no aria-live regions announce changes to screen readers. When new claims arrive or the compiler status changes, sighted users see animations but screen reader users get zero notification. Adding aria-live='polite' to the scoreboard and timeline would fix this without disrupting the visual experience.","evidence":"web","status":"active"},{"id":"r021","type":"recommendation","topic":"accessibility","content":"Five targeted fixes would bring the dashboard to WCAG 2.2 AA: (1) Raise --text-dim from #505a6e to #7a839a (4.5:1 ratio). (2) Add semantic landmarks: <header> for topbar, <main> for layout, role='status' on scoreboard. (3) Add tabindex='0', role='button', aria-expanded, and keydown handler for Enter/Space on claim rows. (4) Add aria-live='polite' to scoreboard and timeline container. (5) Add :focus-visible outline styles to all interactive elements.","evidence":"web","status":"active"},{"id":"r022","type":"risk","topic":"accessibility","content":"The explainer template (templates/explainer.html) imports Google Fonts via @import url('https://fonts.googleapis.com/...'), which is both an external dependency (tension with d002 self-contained constraint) and an accessibility concern: if the CDN is unreachable, text may render in a fallback font with different metrics, potentially breaking layout. The template should use the system font stack already defined as fallback.","evidence":"web","status":"active"},{"id":"p009","type":"factual","topic":"accessibility","content":"All 5 WCAG 2.2 AA fixes implemented on the live dashboard in ~25 lines of changes: (1) --text-dim raised from #505a6e to #7a839a — now 5.08:1 on --bg, 4.68:1 on --surface (both pass AA). (2) Semantic landmarks added: <header> for topbar, <main> for layout, role='status' on scoreboard, role='region' on timeline. (3) Keyboard support: claim rows have tabindex='0', role='button', aria-expanded, Enter/Space keydown handler. (4) aria-live='polite' on scoreboard and timeline — screen readers announce SSE updates. (5) :focus-visible outlines on all interactive elements. Zero visual regression — design unchanged for sighted users.","evidence":"tested","status":"active"},{"id":"e001","type":"factual","topic":"architecture","content":"Compiler scales linearly: 42 claims in 45ms, 100 in 44ms, 250 in 65ms, 500 in 50ms, 1000 in 59ms. Sub-60ms at 1000 claims means the feedback loop stays instant even for large sprints. The 7-pass pipeline has no exponential blowup — conflict detection is the only O(n^2) pass but stays fast due to sparse conflict graphs.","evidence":"tested","status":"active"},{"id":"e002","type":"risk","topic":"architecture","content":"Compiler crashes on empty or unparseable claims.json files (throws unhandled JSON parse error). Gracefully handles structural issues: missing claims array defaults to empty, missing meta defaults to empty, invalid claim fields produce BLOCKED status with errors. Two crash cases (empty file, malformed JSON) should be caught with a try/catch at the top level.","evidence":"tested","status":"active"},{"id":"e003","type":"factual","topic":"output-format","content":"All 7 HTML artifacts verified fully self-contained: zero external script src, link href, @import url, or img src pointing to external resources. Sizes range from 7.3KB (problem-statement) to 26.3KB (live dashboard). Every file opens correctly via file:// with no network requests. Constraint d002 is satisfied across the entire artifact set.","evidence":"tested","status":"active"},{"id":"e004","type":"factual","topic":"accessibility","content":"13/13 WCAG 2.2 AA checks pass on the live dashboard: lang attribute, <header> landmark, <main> landmark, role=status, role=region, aria-live=polite, aria-expanded, tabindex=0, role=button, onkeydown handler, :focus-visible styles, aria-label attributes, and contrast ratio >= 4.5:1. The accessibility research claims (r017-r022) are confirmed implemented and working.","evidence":"tested","status":"active"},{"id":"e005","type":"factual","topic":"dogfooding","content":"The sprint successfully dogfoods itself: 20/42 claims are self-referential (reference the dashboard, Wheat, or the sprint itself). 16 wheat-format git commits trace the full event log. 4 of 5 phases exercised (define, research, prototype, feedback — evaluate now being added). 8 topics covered, 8 artifacts generated, 1 conflict auto-resolved. The visualization demonstrates the framework by being a product of it — constraint d001 is satisfied.","evidence":"tested","status":"active"},{"id":"e006","type":"factual","topic":"quality","content":"Evidence distribution across 40 active claims: stated=11 (27.5%), web=17 (42.5%), documented=4 (10%), tested=9 (22.5%), production=0. The tested tier is the highest reached. 5 of 8 topics have tested-level evidence. The constraint-dominated topics (audience, scope) correctly remain at stated. The quality topic remains at web — the only genuine evidence gap.","evidence":"tested","status":"active"},{"id":"f007","type":"feedback","topic":"quality","content":"Stakeholder loves the Samurai Jack-themed presentation, specifically the 'Compiled by Wheat — gotta get back, back to the past' tagline. The thematic approach (kanji watermarks, brush-stroke dividers, woodblock panel aesthetic) resonates — personality in output artifacts makes the framework more memorable and shareable. This validates the 'I'll know it when I see it' quality bar (d005).","evidence":"stated","status":"active"},{"id":"x001","type":"risk","topic":"dogfooding","content":"The self-referential dogfooding creates a circular dependency: the dashboard's value proposition depends on the sprint being interesting, but the sprint'
